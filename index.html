        const combinations = chosen === 2 ? total * (total - 1) / 2 : total * (total - 1) * (total - 2) / 6;
        const stems = [
          `From ${total} distinct applications, how many groups of ${chosen} can be selected if order does not matter?`,
          `A committee of ${chosen} people is chosen from ${total} candidates. How many different committees are possible?`,
          `How many unordered selections of ${chosen} projects can be made from ${total} distinct projects?`,
          `A reviewer will choose ${chosen} cases from ${total} cases, with order irrelevant. How many choices are possible?`,
          `How many distinct ${chosen}-member teams can be formed from ${total} available people?`,
          `A portfolio will include ${chosen} of ${total} available investments. If order is irrelevant, how many portfolios are possible?`,
          `How many ways can ${chosen} finalists be selected from ${total} nominees?`,
          `A manager picks ${chosen} tasks from a list of ${total}. How many different unordered picks are possible?`,
          `How many subsets of size ${chosen} can be formed from a set of ${total} distinct objects?`,
          `A panel uses ${chosen} of ${total} experts. How many different panels can be assembled?`
        ];
        question.stem = stems[idNumber % stems.length];
        refreshPackedChoices(question, combinations, [total * chosen, Math.max(1, combinations - total), combinations + total, total * (total - 1)], `${question.id}-count`);
        question.explanation = `Because order does not matter, use combinations: ${total} choose ${chosen} = ${combinations}.`;
      } else if (question.id.startsWith("std-q-profit-")) {
        const fixed = 120 + idNumber * 15;
        const price = 14 + (idNumber % 9);
        const cost = 5 + ((idNumber * 2) % 6);
        const units = Math.ceil(fixed / (price - cost)) + 4 + (idNumber % 5);
        const revenue = units * price;
        const variableCost = units * cost;
        const contribution = units * (price - cost);
        const profit = contribution - fixed;
        const breakEven = Math.ceil(fixed / (price - cost));
        const mode = idNumber % 7;
        if (mode === 0) {
          question.stem = `A seller has fixed costs of $${fixed}. Each unit sells for $${price} and costs $${cost} to make. What is the profit from selling ${units} units?`;
          refreshPackedChoices(question, profit, [revenue, variableCost, contribution, Math.max(0, profit - (price - cost))], `${question.id}-profit`);
          question.explanation = `Profit = ${units}(${price} - ${cost}) - ${fixed} = ${profit}.`;
        } else if (mode === 1) {
          question.stem = `A product sells for $${price} per unit. How much revenue is generated by selling ${units} units?`;
          refreshPackedChoices(question, revenue, [variableCost, contribution, profit, revenue + fixed], `${question.id}-revenue`);
          question.explanation = `Revenue is price times units: ${price} x ${units} = ${revenue}.`;
        } else if (mode === 2) {
          question.stem = `Each unit costs $${cost} to make. What is the total variable cost of making ${units} units?`;
          refreshPackedChoices(question, variableCost, [revenue, contribution, fixed, variableCost + fixed], `${question.id}-var-cost`);
          question.explanation = `Variable cost is ${cost} x ${units} = ${variableCost}.`;
        } else if (mode === 3) {
          question.stem = `A unit sells for $${price} and costs $${cost} to make. What is the contribution before fixed costs from ${units} units?`;
          refreshPackedChoices(question, contribution, [revenue, variableCost, profit, contribution + fixed], `${question.id}-contribution`);
          question.explanation = `Contribution before fixed costs is ${units}(${price} - ${cost}) = ${contribution}.`;
        } else if (mode === 4) {
          question.stem = `Fixed costs are $${fixed}, and each unit contributes $${price - cost} after variable cost. What is the least number of units needed to break even?`;
          refreshPackedChoices(question, breakEven, [Math.floor(fixed / (price - cost)), breakEven + 1, Math.max(1, breakEven - 2), units], `${question.id}-break-even`);
          question.explanation = `Break-even units equal fixed cost divided by unit contribution, rounded up: ${fixed} / ${price - cost} = ${compactNumber(fixed / (price - cost))}, so ${breakEven} units are needed.`;
        } else if (mode === 5) {
          question.stem = `A unit sells for $${price} and has variable cost $${cost}. What is the contribution margin per unit before fixed costs?`;
          refreshPackedChoices(question, price - cost, [price, cost, price + cost, fixed / units], `${question.id}-unit-margin`);
          question.explanation = `Contribution margin per unit is selling price minus variable cost: ${price} - ${cost} = ${price - cost}.`;
        } else {
          question.stem = `After selling ${units} units, a seller has revenue of $${revenue}, variable cost of $${variableCost}, and fixed cost of $${fixed}. What is the profit?`;
          refreshPackedChoices(question, profit, [revenue - variableCost, revenue - fixed, variableCost + fixed, Math.max(0, profit + price - cost)], `${question.id}-profit-summary`);
          question.explanation = `Profit = revenue - variable cost - fixed cost = ${revenue} - ${variableCost} - ${fixed} = ${profit}.`;
        }
      }
    }

    function diversifyQuestionBank(bank) {
      bank.forEach((question) => {
        const idNumber = Number((question.id.match(/-(\d+)$/) || [])[1] || 0);
        if (question.id.startsWith("std-q-")) {
          rewriteQuantQuestion(question, idNumber);
        }

        if (question.id.startsWith("std-d-ds-")) {
          rewriteDataSufficiencyQuestion(question, idNumber);
        }

        if (question.id.startsWith("std-d-table-")) {
          const rows = String(question.context).split("\n").slice(1).map((line) => line.split("|").map((part) => part.trim()));
          const values = rows.map((row) => ({ start: Number(row[1]), end: Number(row[2]) }));
          const modes = [
            ["Which region had the greatest absolute increase in units?", (row) => row.end - row.start, "absolute increase"],
            ["Which region had the smallest absolute increase in units?", (row) => -(row.end - row.start), "smallest absolute increase"],
            ["Which region had the greatest percent increase in units?", (row) => (row.end - row.start) / row.start, "percent increase"],
            ["Which region had the highest 2026 unit total?", (row) => row.end, "2026 unit total"],
            ["Which region began the period with the fewest units?", (row) => -row.start, "lowest 2025 unit total"],
            ["Which region had the greatest average of its 2025 and 2026 unit totals?", (row) => (row.start + row.end) / 2, "two-year average"],
            ["Which region's 2026 total exceeded its 2025 total by the greatest ratio?", (row) => row.end / row.start, "2026-to-2025 ratio"],
            ["Which region ended the period with the fewest units?", (row) => -row.end, "lowest 2026 unit total"],
            ["Which region had the greatest combined 2025 and 2026 unit total?", (row) => row.start + row.end, "combined total"],
            ["Which region had the greatest difference between its two listed unit totals?", (row) => Math.abs(row.end - row.start), "difference between listed totals"],
            ["Which region began the period with the most units?", (row) => row.start, "2025 unit total"],
            ["Which region's increase was closest to 20 units?", (row) => -Math.abs((row.end - row.start) - 20), "closeness of increase to 20 units"],
            ["Which region had the lowest 2026-to-2025 ratio?", (row) => -(row.end / row.start), "lowest 2026-to-2025 ratio"],
            ["Which region's 2026 total was closest to its 2025 total?", (row) => -Math.abs(row.end - row.start), "smallest difference between listed totals"],
            ["Which region had the smallest combined 2025 and 2026 unit total?", (row) => -(row.start + row.end), "smallest combined total"],
            ["Which region had the greatest increase as a share of its two-year total?", (row) => (row.end - row.start) / (row.start + row.end), "increase as a share of two-year total"],
            ["Which region had the smallest increase as a share of its 2025 total?", (row) => -((row.end - row.start) / row.start), "smallest increase as a share of 2025 total"],
            ["Which region accounted for the largest share of all 2026 units shown?", (row) => row.end, "share of all 2026 units"],
            ["Which region accounted for the smallest share of all 2025 units shown?", (row) => -row.start, "share of all 2025 units"],
            ["Which region had the largest increase relative to its 2026 total?", (row) => (row.end - row.start) / row.end, "increase relative to 2026 total"]
          ];
          const [stem, metric, label] = modes[idNumber % modes.length];
          const result = winningIndex(values, metric);
          question.stem = stem;
          question.choices = ["Region A", "Region B", "Region C", "Region D", "Tie among regions"];
          question.answer = result.answer;
          question.explanation = `Compute the ${label} for each region. The correct choice is ${question.choices[question.answer]}.`;
        }

        if (question.id.startsWith("std-d-msr-")) {
          const passengerMatches = [...String(question.context).matchAll(/Route ([ABCD]): (\d+)(?! fare)/g)].slice(0, 4);
          const fareMatches = [...String(question.context).matchAll(/Route ([ABCD]): \$(\d+) fare, \$(\d+) cost/g)].slice(0, 4);
          const values = fareMatches.map((match, index) => ({
            passengers: Number(passengerMatches[index][2]),
            fare: Number(match[2]),
            cost: Number(match[3])
          }));
          const modes = [
            ["If expected margin equals fare times forecast passengers minus operating cost, which route has the highest expected margin?", (row) => row.fare * row.passengers - row.cost, "expected margin"],
            ["Which route has the highest expected revenue before operating cost?", (row) => row.fare * row.passengers, "expected revenue"],
            ["Which route has the lowest operating cost?", (row) => -row.cost, "lowest operating cost"],
            ["Which route has the highest forecast passenger count?", (row) => row.passengers, "forecast passengers"],
            ["Which route has the highest fare per passenger?", (row) => row.fare, "fare per passenger"],
            ["Which route has the lowest cost per forecast passenger?", (row) => -(row.cost / row.passengers), "cost per passenger"],
            ["Which route has the highest expected margin per forecast passenger?", (row) => (row.fare * row.passengers - row.cost) / row.passengers, "margin per passenger"],
            ["Which route has the smallest gap between expected revenue and operating cost?", (row) => -Math.abs(row.fare * row.passengers - row.cost), "revenue-cost gap"],
            ["Which route has the greatest difference between fare and cost per forecast passenger?", (row) => row.fare - row.cost / row.passengers, "fare minus cost per passenger"],
            ["Which route has the highest ratio of expected revenue to operating cost?", (row) => row.fare * row.passengers / row.cost, "revenue-to-cost ratio"],
            ["Which route has the lowest expected margin?", (row) => -(row.fare * row.passengers - row.cost), "lowest expected margin"],
            ["Which route has the lowest expected revenue before operating cost?", (row) => -(row.fare * row.passengers), "lowest expected revenue"],
            ["Which route has the highest operating cost?", (row) => row.cost, "highest operating cost"],
            ["Which route has the lowest forecast passenger count?", (row) => -row.passengers, "lowest forecast passengers"],
            ["Which route has the lowest fare per passenger?", (row) => -row.fare, "lowest fare per passenger"],
            ["Which route has the highest cost per forecast passenger?", (row) => row.cost / row.passengers, "highest cost per passenger"],
            ["Which route has the lowest expected margin per forecast passenger?", (row) => -((row.fare * row.passengers - row.cost) / row.passengers), "lowest margin per passenger"],
            ["Which route has the largest gap between expected revenue and operating cost?", (row) => Math.abs(row.fare * row.passengers - row.cost), "largest revenue-cost gap"],
            ["Which route has the smallest difference between fare and cost per forecast passenger?", (row) => -(row.fare - row.cost / row.passengers), "smallest fare minus cost per passenger"],
            ["Which route has the lowest ratio of expected revenue to operating cost?", (row) => -(row.fare * row.passengers / row.cost), "lowest revenue-to-cost ratio"]
          ];
          const [stem, metric, label] = modes[idNumber % modes.length];
          const result = winningIndex(values, metric);
          question.stem = stem;
          question.choices = ["Route A", "Route B", "Route C", "Route D", "Tie among routes"];
          question.answer = result.answer;
          question.explanation = `Compute the ${label} for each route. The correct choice is ${question.choices[question.answer]}.`;
        }

        if (question.id.startsWith("std-v-cr-")) {
          const actor = (question.stem.match(/\b(?:a|an) ([a-z -]+?) (?:found|predicts|argues|expected)/i) || [null, "company"])[1];
          const variant = idNumber % 6;
          if (/Which fact most weakens the conclusion\?/.test(question.stem)) {
            const corrects = [
              `During the same period, the ${actor} made another change that directly affected the same target metric.`,
              `The target metric had already been improving before the plan began.`,
              `The pilot group consisted mostly of customers already likely to improve on the target metric.`,
              `The metric was measured only among users who completed the process, excluding users who abandoned it.`,
              `Similar improvement occurred in comparable cases that were not exposed to the plan.`,
              `A seasonal shift during the pilot period would have improved the metric even without the plan.`
            ];
            refreshPackedChoices(question, corrects[variant], [
              `The ${actor} recently changed its logo.`,
              "The plan was described in a short internal memo.",
              "Competitors use a different approach in another market.",
              "Some employees preferred the previous process for unrelated reasons."
            ], `${question.id}-cr-weaken`);
            question.explanation = "The correct choice weakens the causal conclusion by showing that the observed improvement may not have been caused by the plan.";
          } else if (/Which evidence most strengthens the prediction\?/.test(question.stem)) {
            const corrects = [
              `A comparable group exposed to the plan improved more than a similar group that was not exposed to it.`,
              `The metric improved only after users began using the plan, not during the comparable period before launch.`,
              `Cases with the highest exposure to the plan showed the largest improvement in the target outcome.`,
              `The same improvement appeared in a larger follow-up test using the same plan.`,
              `Comparable locations that did not use the plan showed little or no improvement on the target metric.`,
              `The users affected by the plan were the users whose behavior most strongly influenced the target result.`
            ];
            refreshPackedChoices(question, corrects[variant], [
              `The ${actor} has used unrelated process changes before.`,
              "The plan has a name that employees find easy to remember.",
              "A competitor announced a different initiative.",
              "The pilot report included several charts."
            ], `${question.id}-cr-strengthen`);
            question.explanation = "The correct choice strengthens the prediction by tying the plan, rather than an unrelated factor, to the intended result.";
          } else if (/Which fact best explains the result\?/.test(question.stem)) {
            const corrects = [
              "The plan increased use by low-margin customers while reducing purchases by higher-margin customers.",
              "The target metric counted activity but did not account for the discounts needed to generate that activity.",
              "The change improved one stage of the process while creating a more expensive bottleneck later.",
              "The plan shifted demand toward transactions with unusually high service costs.",
              "The metric improved among new users whose support costs exceeded the revenue they generated.",
              "The plan reduced visible delays but required costly extra staffing to do so."
            ];
            refreshPackedChoices(question, corrects[variant], [
              `The ${actor} recently updated its office directory.`,
              "The metric was discussed at a meeting after the pilot ended.",
              "A different market uses a different naming convention.",
              "Some employees found the old process familiar."
            ], `${question.id}-cr-explain`);
            question.explanation = "The correct choice resolves the apparent discrepancy by showing how one metric can improve while profit falls.";
          } else if (/what question should .* most want answered\?/.test(question.stem)) {
            const corrects = [
              "Whether the plan addresses the constraint that most directly prevents the target improvement.",
              "Whether the expected benefit of the plan is large enough to exceed its implementation and operating costs.",
              "Whether the users affected by the plan are the users whose behavior most strongly drives the target metric.",
              "Whether the pilot cases are representative of the cases in which the plan would be used broadly.",
              "Whether the plan solves the cause of the problem rather than only changing how the problem is measured.",
              "Whether a less costly change would achieve the same target result."
            ];
            refreshPackedChoices(question, corrects[variant], [
              `Whether the ${actor} has recently changed its logo.`,
              "Whether every employee prefers the same wording for the plan.",
              "Whether a competitor uses a different approach in another market.",
              "Whether the plan can be summarized in fewer than ten words."
            ], `${question.id}-cr-evaluate`);
            question.explanation = "The strongest evaluation question tests whether the plan is aimed at the real constraint and whether its benefits justify its costs.";
          }
        }

        if (question.id.startsWith("std-v-rc-")) {
          const subject = (question.context.match(/study of (.*?) compared/) || [null, "the change"])[1];
          const kind = idNumber % 3;
          if (kind === 0) {
            const stems = [
              `Which choice best captures the author's conclusion about ${subject}?`,
              `The central claim of the passage about ${subject} is that`,
              `The passage is mainly concerned with showing that ${subject}`,
              `Which statement best summarizes the passage's view of ${subject}?`,
              `The passage's main point about ${subject} is that`
            ];
            const correct = `${subject} should be evaluated by weighing both measured benefits and operational trade-offs`;
            question.stem = stems[idNumber % stems.length];
            refreshPackedChoices(question, correct, [
              `${subject} produced only negative results and should be abandoned`,
              "one favorable metric is enough to justify the entire change",
              "implementation details are irrelevant when a headline metric improves",
              "the passage is primarily a technical description of how the change works"
            ], `${question.id}-rc-main`);
            question.explanation = `The passage gives a qualified conclusion about ${subject}: it reports a benefit, a limitation, and the need to judge the change with more than one measure.`;
          } else if (kind === 1) {
            const stems = [
              "The passage most strongly implies that managers should",
              `The authors would most likely advise managers evaluating ${subject} to`,
              `The passage suggests that decision makers considering ${subject} should`,
              "The passage implies that managers reviewing a single positive result should",
              `According to the passage, a practical assessment of ${subject} should`
            ];
            const correct = `weigh the benefits of ${subject} against the operational trade-offs`;
            question.stem = stems[idNumber % stems.length];
            refreshPackedChoices(question, correct, [
              `reject all uses of ${subject.split(" ")[0]} technology`,
              "focus only on the fastest-changing metric",
              "assume that any improvement in one metric guarantees a profit increase",
              "ignore implementation details because the broad trend is enough"
            ], `${question.id}-rc-imply`);
            question.explanation = `The passage argues that ${subject} has both benefits and limitations, so the correct inference preserves that trade-off.`;
          } else if (kind === 2) {
            const stems = [
              "The reference to a single headline result primarily serves to",
              "The phrase about a single headline result is used mainly to",
              `The discussion of one headline metric in the passage about ${subject} serves to`,
              "The author mentions a single headline result in order to",
              "In context, the warning about one result primarily serves to"
            ];
            const correct = `show why one metric is insufficient for judging ${subject}`;
            question.stem = stems[idNumber % stems.length];
            refreshPackedChoices(question, correct, [
              `prove that ${subject} should never be used`,
              "show that all measurements are unreliable",
              "argue that managers should ignore implementation costs",
              "suggest that the fastest metric is always the most important"
            ], `${question.id}-rc-role`);
            question.explanation = `The reference limits overinterpretation: one metric can miss trade-offs that matter to the overall evaluation.`;
          }
        }

        question.stem = cleanGeneratedText(question.stem);
        question.context = cleanGeneratedText(question.context);
        question.explanation = cleanGeneratedText(question.explanation);
        question.choices = question.choices.map(cleanGeneratedText);
      });
      return bank;
    }

    function buildStandardsAlignedBank() {
      const questions = [];
      const add = (question) => questions.push(question);
      const dsChoices = [
        "Statement (1) alone is sufficient, but statement (2) alone is not sufficient.",
        "Statement (2) alone is sufficient, but statement (1) alone is not sufficient.",
        "Both statements together are sufficient, but neither alone is sufficient.",
        "Each statement alone is sufficient.",
        "Statements (1) and (2) together are not sufficient."
      ];

      for (let index = 0; index < 70; index += 1) {
        const x = 4 + index;
        const a = 3 + (index % 7);
        const c = 1 + (index % 2);
        const b = 5 + ((index * 5) % 31);
        const d = (a - c) * x + b;
        add(numericQuestion({
          id: `std-q-alg-${index}`,
          section: "Quant",
          topic: "Algebra",
          stem: `If ${a}x + ${b} = ${c}x + ${d}, what is the value of x?`,
          correct: x,
          distractors: [x - 2, x - 1, x + 1, x + 3],
          explanation: `Subtract ${c}x from both sides to get ${a - c}x + ${b} = ${d}. Then ${a - c}x = ${d - b}, so x = ${x}.`,
          difficulty: clamp(1 + Math.floor(index / 16), 1, 5)
        }));
      }

      for (let index = 0; index < 60; index += 1) {
        const original = 80 + index * 7;
        const increase = 8 + ((index * 7) % 37);
        const decrease = 6 + ((index * 11) % 31);
        const finalPercent = Number((100 * (1 + increase / 100) * (1 - decrease / 100)).toFixed(1));
        add(numericQuestion({
          id: `std-q-pct-${index}`,
          section: "Quant",
          topic: "Percents",
          stem: `A value is increased by ${increase}% and then decreased by ${decrease}%. The final value is what percent of the original value?`,
          correct: `${finalPercent}%`,
          distractors: [`${100 + increase - decrease}%`, `${100 - decrease}%`, `${100 + increase}%`, `${Math.max(1, 100 - increase + decrease)}%`],
          explanation: `Successive percent changes multiply: 100 x ${1 + increase / 100} x ${1 - decrease / 100} = ${finalPercent}%.`,
          difficulty: clamp(2 + Math.floor(index / 15), 2, 5)
        }));
      }

      for (let index = 0; index < 55; index += 1) {
        const n1 = 3 + (index % 8);
        const n2 = 4 + ((index * 3) % 9);
        const avg1 = 12 + ((index * 4) % 23);
        const avg2 = 19 + ((index * 5) % 27);
        const combined = Number(((n1 * avg1 + n2 * avg2) / (n1 + n2)).toFixed(1));
        add(numericQuestion({
          id: `std-q-avg-${index}`,
          section: "Quant",
          topic: "Averages",
          stem: `A group of ${n1} numbers has an average of ${avg1}. A second group of ${n2} numbers has an average of ${avg2}. What is the average of all ${n1 + n2} numbers?`,
          correct: combined,
          distractors: [Number(((avg1 + avg2) / 2).toFixed(1)), avg1 + avg2, Number((combined + 2.4).toFixed(1)), Math.max(1, Number((combined - 2.2).toFixed(1)))],
          explanation: `Use a weighted average: (${n1} x ${avg1} + ${n2} x ${avg2}) / ${n1 + n2} = ${combined}.`,
          difficulty: clamp(2 + Math.floor(index / 14), 2, 5)
        }));
      }

      for (let index = 0; index < 55; index += 1) {
        const rateA = 4 + (index % 11);
        const rateB = 7 + ((index * 2) % 13);
        const hours = 2 + (index % 5);
        const work = (rateA + rateB) * hours;
        add(numericQuestion({
          id: `std-q-rate-${index}`,
          section: "Quant",
          topic: "Rates",
          stem: `Machine A completes ${rateA} units per hour and Machine B completes ${rateB} units per hour. Working together, how many hours do they need to complete ${work} units?`,
          correct: hours,
          distractors: [Number((work / rateA).toFixed(1)), Number((work / rateB).toFixed(1)), hours + 1, Math.max(1, hours - 1)],
          explanation: `Together the machines complete ${rateA + rateB} units per hour. Time = ${work} / ${rateA + rateB} = ${hours} hours.`,
          difficulty: clamp(2 + Math.floor(index / 14), 2, 5)
        }));
      }

      for (let index = 0; index < 55; index += 1) {
        const divisorA = 4 + (index % 9);
        const divisorB = 7 + ((index * 2) % 11);
        const remA = 1 + (index % (divisorA - 1));
        const remB = 1 + ((index * 3) % (divisorB - 1));
        let answer = remA;
        let guard = 0;
        while (answer % divisorB !== remB && guard < 200) {
          answer += divisorA;
          guard += 1;
        }
        if (guard >= 200) answer = remA + divisorA * divisorB;
        add(numericQuestion({
          id: `std-q-rem-${index}`,
          section: "Quant",
          topic: "Number Properties",
          stem: `What is the smallest positive integer n that leaves a remainder of ${remA} when divided by ${divisorA} and a remainder of ${remB} when divided by ${divisorB}?`,
          correct: answer,
          distractors: [answer + divisorA, answer + divisorB, Math.max(1, answer - divisorA), answer + divisorA + divisorB],
          explanation: `Check numbers congruent to ${remA} modulo ${divisorA}. The first one with remainder ${remB} modulo ${divisorB} is ${answer}.`,
          difficulty: clamp(3 + Math.floor(index / 16), 3, 5)
        }));
      }

      for (let index = 0; index < 45; index += 1) {
        const total = 7 + index;
        const chosen = index % 3 === 0 ? 3 : 2;
        const combinations = chosen === 2 ? total * (total - 1) / 2 : total * (total - 1) * (total - 2) / 6;
        add(numericQuestion({
          id: `std-q-count-${index}`,
          section: "Quant",
          topic: "Counting",
          stem: `From ${total} distinct applications, how many groups of ${chosen} can be selected if order does not matter?`,
          correct: combinations,
          distractors: [total * chosen, Math.max(1, combinations - total), combinations + total, total * (total - 1)],
          explanation: `Because order does not matter, use combinations: ${total} choose ${chosen} = ${combinations}.`,
          difficulty: clamp(3 + Math.floor(index / 13), 3, 5)
        }));
      }

      for (let index = 0; index < 35; index += 1) {
        const fixed = 120 + index * 15;
        const price = 14 + (index % 9);
        const cost = 5 + ((index * 2) % 6);
        const units = Math.ceil(fixed / (price - cost)) + 4 + (index % 5);
        const profit = units * (price - cost) - fixed;
        add(numericQuestion({
          id: `std-q-profit-${index}`,
          section: "Quant",
          topic: "Word Problems",
          stem: `A seller has fixed costs of $${fixed}. Each unit sells for $${price} and costs $${cost} to make. What is the profit from selling ${units} units?`,
          correct: profit,
          distractors: [units * price, units * cost, profit + fixed, Math.max(0, profit - (price - cost))],
          explanation: `Profit = ${units}(${price} - ${cost}) - ${fixed} = ${profit}.`,
          difficulty: clamp(2 + Math.floor(index / 9), 2, 5)
        }));
      }

      const actors = ["airline", "retailer", "software company", "hospital", "bank", "delivery service", "university", "hotel chain", "fitness app", "manufacturer", "meal-kit company", "insurance firm"];
      const plans = ["launching a mobile check-in tool", "offering a targeted discount", "adding reminder emails", "changing appointment slots", "using automated fraud alerts", "rerouting drivers with software", "moving lessons online", "bundling services", "adding progress streaks", "using a new production process", "simplifying onboarding", "shortening support forms"];
      const goals = ["increase repeat use", "raise profit", "reduce delays", "improve customer satisfaction", "lower operating costs", "increase retention", "reduce errors", "speed up onboarding", "increase paid renewals", "reduce missed appointments"];
      const constraints = ["the plan's added cost will not exceed the financial gain", "customers who express interest will actually change their behavior", "the measured problem is caused by the factor the plan addresses", "the plan will not create a new bottleneck elsewhere", "the survey respondents are representative of affected users", "the plan will reach the users whose behavior most affects the result"];
      const crTypes = ["assumption", "weaken", "strengthen", "evaluate", "explain"];
      for (let index = 0; index < 210; index += 1) {
        const actor = actors[index % actors.length];
        const plan = plans[(index * 5) % plans.length];
        const goal = goals[(index * 7) % goals.length];
        const constraint = constraints[(index * 11) % constraints.length];
        const baseline = 20 + index;
        const measured = 6 + (index % 19);
        const type = crTypes[index % crTypes.length];
        let stem;
        let correct;
        let explanation;
        if (type === "assumption") {
          stem = `A ${actor} argues that ${plan} will ${goal}. The pilot group improved by ${measured}% compared with a baseline of ${baseline}. Which assumption is required by the argument?`;
          correct = constraint.charAt(0).toUpperCase() + constraint.slice(1) + ".";
          explanation = `The conclusion depends on the plan causing the intended result without an offsetting problem. The required assumption is that ${constraint}.`;
        } else if (type === "weaken") {
          stem = `After ${plan}, a ${actor} found that a target metric improved by ${measured}% and concluded that the plan helped ${goal}. Which fact most weakens the conclusion?`;
          correct = `A separate change during the same period could have produced the improved metric without the plan.`;
          explanation = `This weakens the causal claim by giving an alternative explanation for the observed improvement.`;
        } else if (type === "strengthen") {
          stem = `A ${actor} predicts that ${plan} will ${goal} after a ${baseline}-user pilot. Which evidence most strengthens the prediction?`;
          correct = `A comparable group exposed to the plan improved on the target outcome more than a similar group not exposed to the plan.`;
          explanation = `The answer strengthens the argument by directly connecting the plan to the outcome while using a comparison group.`;
        } else if (type === "evaluate") {
          stem = `Before using ${plan} to ${goal} across ${baseline + measured} cases, what question should a ${actor} most want answered?`;
          correct = `Whether the main obstacle to ${goal} is the specific problem that the plan is designed to solve.`;
          explanation = `The most useful evaluation question tests whether the plan attacks the real constraint behind the goal.`;
        } else {
          stem = `A ${actor} expected that ${plan} would ${goal}. Instead, the target metric improved by ${measured}% while total profit declined. Which fact best explains the result?`;
          correct = `The plan increased activity among low-margin customers while reducing purchases by higher-margin customers.`;
          explanation = `The apparent discrepancy is resolved by separating the target metric from profit: one can rise while the other falls.`;
        }
        const packed = packChoices(correct, [
          `The ${actor} recently changed its logo.`,
          `Some employees preferred the previous process for unrelated reasons.`,
          `The plan was announced before it was implemented.`,
          `Competitors use a different approach in another market.`
        ], `std-v-cr-${index}`);
        add({
          id: `std-v-cr-${index}`,
          section: "Verbal",
          topic: "Critical Reasoning",
          stem,
          choices: packed.choices,
          answer: packed.answer,
          explanation,
          difficulty: clamp(2 + (index % 4), 2, 5)
        });
      }

      const passageThemes = [
        ["warehouse automation", "robots increased picking speed but required clearer bin labeling", "automation gains depend on matching technology with process design"],
        ["remote training", "short modules improved completion but reduced peer discussion", "training design involves a trade-off between convenience and interaction"],
        ["airline pricing", "lower fares increased bookings but reduced ancillary purchases", "revenue effects can differ from demand effects"],
        ["urban transit", "express buses helped long trips but skipped some short-trip riders", "efficiency improvements can shift benefits across user groups"],
        ["medical triage", "software flagged urgent cases faster but created false alarms", "decision tools must balance speed with accuracy"],
        ["subscription products", "free trials increased signups but attracted lower-retention users", "customer quality matters as much as signup volume"],
        ["supply chains", "larger inventories reduced stockouts but tied up cash", "operational resilience can have financial costs"],
        ["data dashboards", "more metrics increased visibility but slowed decisions", "information systems should prioritize actionable signals"],
        ["energy storage", "batteries smoothed demand peaks but depended on local pricing rules", "technology value depends on economic context"],
        ["restaurant ordering", "kiosks reduced checkout lines but raised customization errors", "automation can move friction from one step to another"],
        ["customer support chatbots", "automated replies shortened queues but missed unusual requests", "service automation works best when escalation paths remain clear"],
        ["inventory forecasting", "prediction software reduced stockouts but overestimated seasonal demand", "forecasts should be judged by both shortages and excess inventory"],
        ["mobile banking", "instant alerts reduced fraud losses but increased false reports", "risk tools require a balance between sensitivity and precision"],
        ["online education", "self-paced lessons improved completion for experienced learners but hurt novices", "learner background affects whether flexibility is beneficial"],
        ["fleet maintenance", "predictive sensors caught failures earlier but increased inspection workload", "early warnings have value only when teams can act on them"]
      ];
      for (let index = 0; index < 120; index += 1) {
        const [subject, evidence, thesis] = passageThemes[index % passageThemes.length];
        const kind = index % 3;
        const context = `A study of ${subject} compared ${18 + index} operating units over ${4 + (index % 5)} months and found that ${evidence}. The authors did not conclude that the change was simply good or bad. Instead, they argued that ${thesis}, especially when managers use multiple performance measures rather than a single headline result.`;
        const stems = [
          "Which choice best states the main point of the passage?",
          "The passage most strongly implies that managers should",
          "The reference to a single headline result primarily serves to"
        ];
        const corrects = [
          thesis.charAt(0).toUpperCase() + thesis.slice(1) + ", so the change should be evaluated with more than one metric.",
          "evaluate the change using both its benefits and its trade-offs",
          "warn against judging a complex operational change by one metric alone"
        ];
        const packed = packChoices(corrects[kind], [
          `reject all uses of ${subject.split(" ")[0]} technology`,
          "focus only on the fastest-changing metric",
          "assume that any improvement in one metric guarantees a profit increase",
          "ignore implementation details because the broad trend is enough"
        ], `std-v-rc-${index}`);
        add({
          id: `std-v-rc-${index}`,
          section: "Verbal",
          topic: "Reading Comprehension",
          context,
          stem: stems[kind],
          choices: packed.choices,
          answer: packed.answer,
          explanation: `The passage identifies a benefit, a limitation, and a broader conclusion about evaluating trade-offs. The correct answer preserves that qualification.`,
          difficulty: clamp(2 + kind + Math.floor((index % 12) / 7), 2, 5)
        });
      }

      for (let index = 0; index < 120; index += 1) {
        const type = index % 5;
        let stem;
        let answer;
        let explanation;
        if (type === 0) {
          const sum = 36 + index * 2;
          stem = `What is the average of x, y, and z?\n(1) x + y + z = ${sum}\n(2) x = y`;
          answer = 0;
          explanation = `Statement (1) gives the total, so the average is determined. Statement (2) alone gives only a relationship.`;
        } else if (type === 1) {
          const value = 10 + index;
          stem = `Is x greater than ${value}?\n(1) x is positive\n(2) x > ${value + 3}`;
          answer = 1;
          explanation = `Statement (1) allows positive values below or above ${value}. Statement (2) directly implies x > ${value}.`;
        } else if (type === 2) {
          const divisor = [3, 5, 7, 9, 11, 13][index % 6];
          stem = `Is integer n divisible by ${divisor * 2}?\n(1) n is divisible by ${divisor}\n(2) n is even`;
          answer = 2;
          explanation = `Neither statement alone guarantees divisibility by ${divisor * 2}. Since ${divisor} is odd, the two statements together guarantee divisibility by ${divisor} and by 2.`;
        } else if (type === 3) {
          stem = `Is integer n odd?\n(1) n + 1 is even\n(2) 3n is odd`;
          answer = 3;
          explanation = `If n + 1 is even, n is odd. If 3n is odd, n is odd. Each statement alone is sufficient.`;
        } else {
          const sum = 20 + index;
          const second = 12 + index;
          stem = `What is the value of x?\n(1) x + y = ${sum}\n(2) y + z = ${second}`;
          answer = 4;
          explanation = `Even together the statements leave multiple possible values for x because z is unrestricted. The value of x is not determined.`;
        }
        add({
          id: `std-d-ds-${index}`,
          section: "DI",
          topic: "Data Sufficiency",
          stem,
          choices: dsChoices,
          answer,
          explanation,
          difficulty: clamp(2 + (index % 4), 2, 5)
        });
      }

      for (let index = 0; index < 120; index += 1) {
        const base = 90 + index * 4;
        const values = [base, base + 12 + (index % 11), base + 25 + ((index * 2) % 13), base + 9 + ((index * 5) % 19)];
        const next = values.map((value, valueIndex) => value + 8 + ((index + valueIndex * 9) % 32));
        const growth = next.map((value, valueIndex) => value - values[valueIndex]);
        const answer = growth.indexOf(Math.max(...growth));
        add({
          id: `std-d-table-${index}`,
          section: "DI",
          topic: "Table Analysis",
          context: `Region | 2025 units | 2026 units\nA | ${values[0]} | ${next[0]}\nB | ${values[1]} | ${next[1]}\nC | ${values[2]} | ${next[2]}\nD | ${values[3]} | ${next[3]}`,
          stem: "Which region had the greatest absolute increase in units?",
          choices: ["Region A", "Region B", "Region C", "Region D", "All regions tie"],
          answer,
          explanation: `Compute 2026 units minus 2025 units for each region. The largest increase is for Region ${["A", "B", "C", "D"][answer]}.`,
          difficulty: clamp(1 + Math.floor(index / 28), 1, 5)
        });
      }

      for (let index = 0; index < 120; index += 1) {
        const routeNames = ["A", "B", "C", "D"];
        const fares = routeNames.map((_, routeIndex) => 110 + ((index * 13 + routeIndex * 29) % 95));
        const passengers = routeNames.map((_, routeIndex) => 42 + ((index * 7 + routeIndex * 11) % 38));
        const costs = routeNames.map((_, routeIndex) => 4200 + ((index * 251 + routeIndex * 467) % 1800));
        const margins = routeNames.map((_, routeIndex) => fares[routeIndex] * passengers[routeIndex] - costs[routeIndex]);
        const answer = margins.indexOf(Math.max(...margins));
        add({
          id: `std-d-msr-${index}`,
          section: "DI",
          topic: "Multi-Source Reasoning",
          context: `Source 1 - Forecast passengers\nRoute A: ${passengers[0]}\nRoute B: ${passengers[1]}\nRoute C: ${passengers[2]}\nRoute D: ${passengers[3]}\n\nSource 2 - Fare and operating cost\nRoute A: $${fares[0]} fare, $${costs[0]} cost\nRoute B: $${fares[1]} fare, $${costs[1]} cost\nRoute C: $${fares[2]} fare, $${costs[2]} cost\nRoute D: $${fares[3]} fare, $${costs[3]} cost`,
          stem: "If expected margin equals fare times forecast passengers minus operating cost, which route has the highest expected margin?",
          choices: ["Route A", "Route B", "Route C", "Route D", "All routes tie"],
          answer,
          explanation: `Expected margins are A: ${margins[0]}, B: ${margins[1]}, C: ${margins[2]}, and D: ${margins[3]}. Route ${routeNames[answer]} is highest.`,
          difficulty: clamp(2 + Math.floor(index / 30), 2, 5)
        });
      }

      return questions;
    }

    BANK.forEach((question, index) => {
      question.difficulty = question.difficulty || clamp(1 + Math.floor((index % 12) / 3), 1, 5);
      question.source = "seed";
    });
    BANK.splice(0, BANK.length, ...pruneQuestionBank(BANK));
    BANK.push(...buildStandardsAlignedBank());
    diversifyQuestionBank(BANK);
    BANK.splice(0, BANK.length, ...pruneQuestionBank(BANK));

    const SECTION_SECONDS = 90 * 60;
    const STORAGE_KEY = "flight-gmat-state-v2";
    const LETTERS = ["A", "B", "C", "D", "E"];
    const sections = ["Quant", "Verbal", "DI"];
    const modes = ["Adaptive", "Marathon", "Review"];
    const questionById = new Map(BANK.map((question) => [question.id, question]));
    const $ = (selector) => document.querySelector(selector);

    const defaultState = () => ({
      section: "Quant",
      mode: "Adaptive",
      indexBySection: { Quant: 0, Verbal: 0, DI: 0 },
      queueBySection: { Quant: [], Verbal: [], DI: [] },
      targetDifficulty: { Quant: 2, Verbal: 2, DI: 2 },
      streakBySection: { Quant: 0, Verbal: 0, DI: 0 },
      topicStats: {},
      answers: {},
      flagged: {},
      showExplanation: {},
      notes: "",
      paused: false,
      timers: { Quant: SECTION_SECONDS, Verbal: SECTION_SECONDS, DI: SECTION_SECONDS }
    });

    let state = loadState();
    let tickHandle = null;

    function loadState() {
      try {
        const stored = JSON.parse(localStorage.getItem(STORAGE_KEY));
        const base = defaultState();
        return Object.assign(base, stored || {}, {
          mode: modes.includes(stored?.mode) ? stored.mode : "Adaptive",
          indexBySection: Object.assign(base.indexBySection, stored?.indexBySection || {}),
          queueBySection: Object.assign(base.queueBySection, stored?.queueBySection || {}),
          targetDifficulty: Object.assign(base.targetDifficulty, stored?.targetDifficulty || {}),
          streakBySection: Object.assign(base.streakBySection, stored?.streakBySection || {}),
          topicStats: stored?.topicStats || {},
          answers: stored?.answers || {},
          flagged: stored?.flagged || {},
          showExplanation: stored?.showExplanation || {},
          timers: Object.assign(base.timers, stored?.timers || {})
        });
      } catch (_) {
        return defaultState();
      }
    }

    function saveState() {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
        $("#saveState").textContent = "Local progress";
      } catch (_) {
        $("#saveState").textContent = "Session only";
      }
    }

    function bySection(section = state.section) {
      return BANK
        .filter((q) => q.section === section)
        .sort((a, b) => a.difficulty - b.difficulty || a.topic.localeCompare(b.topic) || a.id.localeCompare(b.id));
    }

    function cleanQueue(section = state.section) {
      const validIds = new Set(bySection(section).map((question) => question.id));
      state.queueBySection[section] = (state.queueBySection[section] || []).filter((id) => validIds.has(id));
      return state.queueBySection[section];
    }

    function topicWeakness(topic) {
      const stats = state.topicStats[topic];
      if (!stats) return 0;
      return Math.max(0, (stats.wrong || 0) - (stats.correct || 0));
    }

    function pickAdaptiveQuestion(section = state.section) {
      const queue = cleanQueue(section);
      const lastId = queue[queue.length - 1];
      const all = bySection(section);
      const unanswered = all.filter((question) => !state.answers[question.id]);
      const pool = (unanswered.length ? unanswered : all).filter((question) => question.id !== lastId);
      const candidates = pool.length ? pool : all;
      const target = state.targetDifficulty[section] || 2;
      return candidates
        .map((question) => {
          const answeredPenalty = state.answers[question.id] ? 42 : 0;
          const queuePenalty = queue.includes(question.id) ? 18 : 0;
          const weakTopicBonus = topicWeakness(question.topic) * 8;
          const jitter = hashText(`${question.id}-${queue.length}`) % 7;
          return {
            question,
            score: Math.abs(question.difficulty - target) * 20 + answeredPenalty + queuePenalty + jitter - weakTopicBonus
          };
        })
        .sort((a, b) => a.score - b.score || a.question.id.localeCompare(b.question.id))[0]?.question;
    }

    function ensureAdaptiveQueue(section = state.section) {
      cleanQueue(section);
      if (!state.queueBySection[section].length) {
        const first = pickAdaptiveQuestion(section);
        if (first) state.queueBySection[section].push(first.id);
      }
      const queue = state.queueBySection[section];
      const maxIndex = Math.max(0, queue.length - 1);
      state.indexBySection[section] = clamp(state.indexBySection[section] || 0, 0, maxIndex);
      return queue.map((id) => questionById.get(id)).filter(Boolean);
    }

    function currentList() {
      if (state.mode === "Adaptive") return ensureAdaptiveQueue();
      if (state.mode === "Review") {
        const reviewList = bySection().filter((q) => state.flagged[q.id] || (state.answers[q.id] && !state.answers[q.id].correct));
        return reviewList.length ? reviewList : bySection().filter((q) => state.answers[q.id]).slice(0, 24).concat(bySection().slice(0, 1)).slice(0, 24);
      }
      return bySection();
    }

    function currentQuestion() {
      const list = currentList();
      const index = Math.min(state.indexBySection[state.section] || 0, list.length - 1);
      state.indexBySection[state.section] = index;
      return list[index];
    }

    function currentIndex() {
      return state.indexBySection[state.section] || 0;
    }

    function setIndex(index) {
      const list = currentList();
      state.indexBySection[state.section] = Math.max(0, Math.min(index, list.length - 1));
      saveState();
      render();
    }

    function statsFor(section = state.section) {
      const list = bySection(section);
      const answered = list.filter((q) => state.answers[q.id]).length;
      const correct = list.filter((q) => state.answers[q.id]?.correct).length;
      const flagged = list.filter((q) => state.flagged[q.id]).length;
      const wrong = list.filter((q) => state.answers[q.id] && !state.answers[q.id].correct).length;
      const accuracy = answered ? Math.round((correct / answered) * 100) : 0;
      return { answered, correct, flagged, wrong, total: list.length, accuracy };
    }

    function formatTime(seconds) {
      const value = Math.max(0, seconds);
      const minutes = Math.floor(value / 60);
      const remainingSeconds = value % 60;
      return `${minutes}:${String(remainingSeconds).padStart(2, "0")}`;
    }

    function renderTimer() {
      const remaining = state.timers[state.section] ?? SECTION_SECONDS;
      $("#timerValue").innerHTML = `${formatTime(remaining)} <span>left</span>`;
      $("#timerProgress").style.transform = `scaleX(${Math.max(0, remaining / SECTION_SECONDS)})`;
      $("#pauseButton").innerHTML = `${state.paused ? icon.play : icon.pause} ${state.paused ? "Resume" : "Pause"}`;
      $("#pauseButton").setAttribute("aria-label", state.paused ? "Resume timer" : "Pause timer");
      $("#resetButton").innerHTML = `${icon.reset} Reset`;
      $("#planSummary").textContent = `${sectionLabel[state.section] || state.section} - ${state.mode}`;
    }

    function renderSegments() {
      document.querySelectorAll(".segment").forEach((button) => {
        button.setAttribute("aria-selected", String(button.dataset.section === state.section));
      });
    }

    function renderModes() {
      document.querySelectorAll(".mode-button").forEach((button) => {
        button.setAttribute("aria-selected", String(button.dataset.mode === state.mode));
      });
    }

    function renderProgress(list) {
      const strip = $("#progressStrip");
      const index = currentIndex();
      const windowSize = Math.min(12, list.length);
      const start = Math.max(0, Math.min(index - 5, list.length - windowSize));
      const visible = list.slice(start, start + windowSize);
      strip.style.setProperty("--count", visible.length || 1);
      strip.innerHTML = "";
      visible.forEach((question, offset) => {
        const absoluteIndex = start + offset;
        const answer = state.answers[question.id];
        const marker = document.createElement("span");
        marker.className = "dot";
        if (absoluteIndex === index) marker.classList.add("is-current");
        if (answer?.correct) marker.classList.add("is-correct");
        if (answer && !answer.correct) marker.classList.add("is-wrong");
        if (state.flagged[question.id]) marker.classList.add("is-flagged");
        marker.setAttribute("aria-hidden", "true");
        strip.appendChild(marker);
      });
    }

    function renderChoices(question) {
      const choices = $("#choices");
      const answer = state.answers[question.id];
      const show = Boolean(state.showExplanation[question.id]);
      choices.innerHTML = "";
      question.choices.forEach((choice, index) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "choice";
        if (answer?.choice === index) button.classList.add("is-selected");
        if (show && index === question.answer) button.classList.add("is-correct");
        if (show && answer?.choice === index && !answer.correct) button.classList.add("is-wrong");
        button.innerHTML = `<span class="choice-letter">${LETTERS[index]}</span><span class="choice-text">${choice}</span>`;
        button.addEventListener("click", () => chooseAnswer(question, index));
        choices.appendChild(button);
      });
    }

    function renderExplanation(question) {
      const answer = state.answers[question.id];
      const isVisible = Boolean(answer && state.showExplanation[question.id]);
      const explanation = $("#explanation");
      explanation.classList.toggle("is-visible", isVisible);
      $("#explainButton").disabled = !answer;
      $("#explainButton").innerHTML = answer ? `${icon.eye} ${isVisible ? "Hide explanation" : "Show explanation"}` : `${icon.eye} Answer first`;
      if (!answer) {
        $("#resultLabel").className = "result";
        $("#resultLabel").textContent = "";
        $("#correctAnswer").textContent = "";
        $("#explanationText").textContent = "";
        return;
      }
      if (answer?.correct) {
        $("#resultLabel").className = "result";
        $("#resultLabel").innerHTML = `${icon.check} Correct`;
      } else {
        $("#resultLabel").className = "result is-wrong";
        $("#resultLabel").innerHTML = `${icon.x} Review this`;
      }
      $("#correctAnswer").textContent = `Answer: ${LETTERS[question.answer]}`;
      $("#explanationText").textContent = question.explanation;
    }

    function renderErrorLog() {
      const list = bySection();
      const missed = list.filter((q) => state.answers[q.id] && !state.answers[q.id].correct);
      const container = $("#errorList");
      container.innerHTML = "";
      if (!missed.length) {
        const empty = document.createElement("p");
        empty.className = "empty";
        empty.textContent = "Missed questions will appear here as you practice.";
        container.appendChild(empty);
        return;
      }
      missed.forEach((question) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "error-item";
        const index = list.findIndex((q) => q.id === question.id);
        button.innerHTML = `
          <span class="tiny-icon" style="color: var(--red)">${icon.x}</span>
          <span><strong>Q${index + 1} - ${question.topic}</strong><span>${question.stem}</span></span>
          <span class="tiny-icon" aria-hidden="true">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none"><path d="m9 18 6-6-6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </span>
        `;
        button.addEventListener("click", () => {
          state.mode = "Review";
          const reviewIndex = currentList().findIndex((q) => q.id === question.id);
          state.indexBySection[state.section] = Math.max(0, reviewIndex);
          state.showExplanation[question.id] = true;
          saveState();
          render();
          window.scrollTo({ top: 0, behavior: "smooth" });
        });
        container.appendChild(button);
      });
    }

    function renderStats() {
      const stats = statsFor();
      const target = state.targetDifficulty[state.section] || 2;
      $("#doneStat").textContent = `${stats.answered}/${stats.total}`;
      $("#rightStat").textContent = `${stats.accuracy}%`;
      $("#flagStat").textContent = `L${target}`;
      $("#difficultyChip").textContent = `Target L${target}`;
      $("#scoreChip").textContent = `${stats.correct}/${stats.answered || 0}`;
      $("#reviewMissedButton").textContent = stats.wrong ? `Missed ${stats.wrong}` : "Missed";
    }

    function render() {
      const list = currentList();
      const question = currentQuestion();
      const index = currentIndex();
      const answer = state.answers[question.id];

      renderTimer();
      renderSegments();
      renderModes();
      renderProgress(list);
      renderStats();

      $("#questionCount").textContent = state.mode === "Adaptive" ? `Question ${index + 1} - Level ${state.targetDifficulty[state.section] || 2}` : `Question ${index + 1} of ${list.length}`;
      $("#questionTopic").textContent = `${question.topic} - L${question.difficulty}`;
      $("#questionStem").textContent = question.stem;
      $("#questionContext").hidden = !question.context;
      $("#questionContext").textContent = question.context || "";
      $("#flagButton").innerHTML = state.flagged[question.id] ? icon.flagFilled : icon.flag;
      $("#reviewButton").innerHTML = `${state.flagged[question.id] ? icon.flagFilled : icon.flag} Review`;

      renderChoices(question);
      renderExplanation(question);
      renderErrorLog();

      $("#previousButton").disabled = index === 0;
      $("#nextButton").textContent = state.mode === "Adaptive" || index < list.length - 1 ? "Next" : "Finish";
      $("#notes").value = state.notes || "";

      if (answer && !state.showExplanation[question.id]) {
        $("#explainButton").classList.add("primary");
      } else {
        $("#explainButton").classList.remove("primary");
      }
    }

    function chooseAnswer(question, choice) {
      const previous = state.answers[question.id];
      const correct = choice === question.answer;
      state.answers[question.id] = {
        choice,
        correct,
        section: question.section,
        topic: question.topic,
        difficulty: question.difficulty,
        at: Date.now()
      };
      if (!previous) updateAdaptiveDifficulty(question, correct);
      state.showExplanation[question.id] = true;
      saveState();
      render();
    }

    function updateAdaptiveDifficulty(question, correct) {
      const section = question.section;
      const topicStats = state.topicStats[question.topic] || { correct: 0, wrong: 0 };
      if (correct) topicStats.correct += 1;
      else topicStats.wrong += 1;
      state.topicStats[question.topic] = topicStats;

      const previousTarget = state.targetDifficulty[section] || 2;
      if (correct) {
        state.streakBySection[section] = (state.streakBySection[section] || 0) + 1;
        const shouldRaise = state.streakBySection[section] >= 2 || question.difficulty > previousTarget;
        state.targetDifficulty[section] = clamp(previousTarget + (shouldRaise ? 1 : 0), 1, 5);
      } else {
        state.streakBySection[section] = 0;
        state.targetDifficulty[section] = clamp(previousTarget - 1, 1, 5);
      }
    }

    function toggleFlag() {
      const question = currentQuestion();
      state.flagged[question.id] = !state.flagged[question.id];
      if (!state.flagged[question.id]) delete state.flagged[question.id];
      saveState();
      render();
    }

    function startTimer() {
      clearInterval(tickHandle);
      tickHandle = setInterval(() => {
        if (state.paused) return;
        const remaining = state.timers[state.section] ?? SECTION_SECONDS;
        if (remaining <= 0) return;
        state.timers[state.section] = remaining - 1;
        renderTimer();
        if (remaining % 10 === 0) saveState();
      }, 1000);
    }

    function resetSection() {
      const list = bySection();
      list.forEach((question) => {
        delete state.answers[question.id];
        delete state.flagged[question.id];
        delete state.showExplanation[question.id];
      });
      state.indexBySection[state.section] = 0;
      state.queueBySection[state.section] = [];
      state.targetDifficulty[state.section] = 2;
      state.streakBySection[state.section] = 0;
      state.timers[state.section] = SECTION_SECONDS;
      state.paused = false;
      saveState();
      render();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function jumpToMissed() {
      const previousMode = state.mode;
      state.mode = "Review";
      const list = currentList();
      const index = list.findIndex((q) => state.answers[q.id] && !state.answers[q.id].correct);
      if (index >= 0) {
        state.indexBySection[state.section] = index;
        state.showExplanation[list[index].id] = true;
        saveState();
        render();
        window.scrollTo({ top: 0, behavior: "smooth" });
      } else {
        state.mode = previousMode;
        saveState();
        render();
      }
    }

    document.querySelectorAll(".segment").forEach((button) => {
      button.addEventListener("click", () => {
        state.section = button.dataset.section;
        const list = currentList();
        state.indexBySection[state.section] = clamp(state.indexBySection[state.section] || 0, 0, Math.max(0, list.length - 1));
        saveState();
        render();
        window.scrollTo({ top: 0, behavior: "smooth" });
      });
    });

    document.querySelectorAll(".mode-button").forEach((button) => {
      button.addEventListener("click", () => {
        state.mode = button.dataset.mode;
        const list = currentList();
        state.indexBySection[state.section] = clamp(state.indexBySection[state.section] || 0, 0, Math.max(0, list.length - 1));
        saveState();
        render();
        window.scrollTo({ top: 0, behavior: "smooth" });
      });
    });

    $("#pauseButton").addEventListener("click", () => {
      state.paused = !state.paused;
      saveState();
      render();
    });

    $("#resetButton").addEventListener("click", resetSection);
    $("#flagButton").addEventListener("click", toggleFlag);
    $("#reviewButton").addEventListener("click", toggleFlag);

    $("#explainButton").addEventListener("click", () => {
      const question = currentQuestion();
      if (!state.answers[question.id]) return;
      state.showExplanation[question.id] = !state.showExplanation[question.id];
      saveState();
      render();
    });

    $("#previousButton").addEventListener("click", () => setIndex(currentIndex() - 1));
    $("#nextButton").addEventListener("click", () => {
      const list = currentList();
      if (state.mode === "Adaptive" && currentIndex() === list.length - 1) {
        const next = pickAdaptiveQuestion();
        if (next) {
          state.queueBySection[state.section].push(next.id);
          state.indexBySection[state.section] = state.queueBySection[state.section].length - 1;
          saveState();
          render();
          window.scrollTo({ top: 0, behavior: "smooth" });
        }
        return;
      }
      if (currentIndex() === list.length - 1) {
        state.paused = true;
        saveState();
        render();
        window.scrollTo({ top: document.body.scrollHeight, behavior: "smooth" });
        return;
      }
      setIndex(currentIndex() + 1);
      window.scrollTo({ top: 0, behavior: "smooth" });
    });

    $("#reviewMissedButton").addEventListener("click", jumpToMissed);
    $("#clearLogButton").addEventListener("click", () => {
      bySection().forEach((question) => {
        if (state.answers[question.id] && !state.answers[question.id].correct) {
          delete state.answers[question.id];
          delete state.showExplanation[question.id];
        }
      });
      saveState();
      render();
    });

    $("#notes").addEventListener("input", (event) => {
      state.notes = event.target.value;
      saveState();
    });

    $("#clearNotesButton").addEventListener("click", () => {
      state.notes = "";
      saveState();
      render();
    });

    window.addEventListener("pagehide", saveState);
    render();
    startTimer();

    if ("serviceWorker" in navigator && /^https?:$/.test(window.location.protocol)) {
      navigator.serviceWorker.register("./sw.js").catch(() => {});
    }
  </script>
</body>
</html>
