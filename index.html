<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Flight GMAT">
  <meta name="theme-color" content="#ffffff">
  <title>Flight GMAT</title>
  <style>
    :root {
      --bg: #ffffff;
      --surface: #f7f9fa;
      --surface-strong: #eef5f4;
      --text: #101828;
      --muted: #61707a;
      --line: #d9e1e4;
      --line-strong: #c4d0d5;
      --teal: #08766d;
      --teal-strong: #055f59;
      --teal-soft: #e5f5f3;
      --amber: #b76a00;
      --amber-soft: #fff3dc;
      --red: #c3332b;
      --red-soft: #fff0ee;
      --green: #167b3a;
      --green-soft: #eaf7ed;
      --shadow: 0 18px 48px rgba(16, 24, 40, 0.08);
      --radius: 8px;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: var(--text);
      background: var(--bg);
    }

    * {
      box-sizing: border-box;
    }

    [hidden] {
      display: none !important;
    }

    html {
      background: var(--bg);
      min-height: 100%;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      letter-spacing: 0;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    button,
    input,
    textarea {
      font: inherit;
    }

    button {
      border: 0;
      background: transparent;
      color: inherit;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .app {
      min-height: 100vh;
      padding-bottom: calc(88px + var(--safe-bottom));
      background:
        linear-gradient(180deg, #ffffff 0%, #ffffff 62%, #f7f9fa 100%);
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      min-height: 58px;
      padding: calc(10px + env(safe-area-inset-top, 0px)) 16px 10px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.96);
      backdrop-filter: blur(18px);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .brand-mark,
    .icon-button,
    .tiny-icon {
      display: inline-grid;
      place-items: center;
      flex: 0 0 auto;
    }

    .brand-mark {
      width: 32px;
      height: 32px;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--teal);
      background: var(--surface);
    }

    .brand-title {
      display: grid;
      gap: 1px;
      min-width: 0;
    }

    h1 {
      margin: 0;
      font-size: 20px;
      line-height: 1.05;
      font-weight: 760;
      letter-spacing: 0;
    }

    .micro {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.2;
      font-weight: 560;
    }

    .offline {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      height: 32px;
      padding: 0 10px;
      border: 1px solid #b6d9d4;
      border-radius: 999px;
      color: var(--teal-strong);
      background: var(--teal-soft);
      font-size: 13px;
      font-weight: 680;
      white-space: nowrap;
    }

    .shell {
      width: min(100%, 920px);
      margin: 0 auto;
    }

    .session {
      display: grid;
      grid-template-columns: 48px minmax(0, 1fr) 48px;
      align-items: center;
      gap: 10px;
      padding: 12px 16px 10px;
      border-bottom: 1px solid var(--line);
      background: #ffffff;
    }

    .icon-button {
      width: 44px;
      height: 44px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      color: var(--text);
      background: #ffffff;
    }

    .icon-button:active,
    .text-button:active,
    .choice:active,
    .segment:active,
    .mode-button:active {
      transform: translateY(1px);
    }

    .timer-card {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: center;
      gap: 10px;
      min-height: 44px;
      padding: 8px 10px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
    }

    .timer-label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 680;
      line-height: 1;
    }

    .timer-value {
      display: inline-flex;
      align-items: baseline;
      gap: 6px;
      color: var(--amber);
      font-variant-numeric: tabular-nums;
      font-size: 22px;
      line-height: 1;
      font-weight: 780;
    }

    .timer-value span {
      color: var(--muted);
      font-size: 12px;
      font-weight: 650;
    }

    .timer-progress {
      height: 4px;
      margin-top: 7px;
      border-radius: 999px;
      background: #e6ecef;
      overflow: hidden;
    }

    .timer-progress > span {
      display: block;
      height: 100%;
      width: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--teal), var(--amber));
      transform-origin: left center;
    }

    .segments {
      position: sticky;
      top: calc(59px + env(safe-area-inset-top, 0px));
      z-index: 18;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 6px;
      padding: 10px 16px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.96);
      backdrop-filter: blur(18px);
    }

    .segment {
      min-width: 0;
      min-height: 40px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      color: var(--muted);
      background: #ffffff;
      font-size: 14px;
      line-height: 1;
      font-weight: 720;
    }

    .segment[aria-selected="true"] {
      border-color: #83c5bf;
      color: var(--teal-strong);
      background: var(--teal-soft);
      box-shadow: inset 0 0 0 1px rgba(8, 118, 109, 0.08);
    }

    .modes {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 6px;
      padding: 0 16px 10px;
      border-bottom: 1px solid var(--line);
      background: #ffffff;
    }

    .mode-button {
      min-width: 0;
      min-height: 36px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      color: var(--muted);
      background: var(--surface);
      font-size: 13px;
      line-height: 1;
      font-weight: 760;
    }

    .mode-button[aria-selected="true"] {
      border-color: #e0b063;
      color: #774600;
      background: var(--amber-soft);
    }

    .content {
      display: grid;
      gap: 14px;
      padding: 14px 16px 0;
    }

    .question-panel,
    .review-panel,
    .stats-panel {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #ffffff;
      box-shadow: var(--shadow);
    }

    .question-panel {
      overflow: hidden;
    }

    .question-head {
      display: grid;
      gap: 8px;
      padding: 14px 14px 12px;
      border-bottom: 1px solid var(--line);
      background: #ffffff;
    }

    .question-topline {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      min-width: 0;
    }

    .question-count {
      font-size: 14px;
      font-weight: 760;
      line-height: 1.2;
    }

    .topic {
      max-width: 45%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--muted);
      font-size: 12px;
      font-weight: 680;
      text-align: right;
    }

    .progress-strip {
      display: grid;
      grid-template-columns: repeat(var(--count), minmax(14px, 1fr));
      gap: 4px;
      align-items: center;
    }

    .dot {
      position: relative;
      min-width: 0;
      height: 24px;
      border: 0;
      border-radius: 6px;
      background: #edf1f3;
    }

    .dot::after {
      content: "";
      position: absolute;
      inset: 8px max(5px, 30%) 8px;
      border-radius: 999px;
      background: #bdc9cf;
    }

    .dot.is-current {
      background: var(--teal-soft);
      outline: 1px solid #80c5bf;
    }

    .dot.is-correct::after {
      background: var(--green);
    }

    .dot.is-wrong::after {
      background: var(--red);
    }

    .dot.is-flagged::before {
      content: "";
      position: absolute;
      top: 3px;
      right: 3px;
      width: 5px;
      height: 5px;
      border-radius: 999px;
      background: var(--amber);
    }

    .question-body {
      display: grid;
      gap: 14px;
      padding: 16px 14px 14px;
    }

    .stem {
      margin: 0;
      color: var(--text);
      font-size: 18px;
      line-height: 1.48;
      font-weight: 620;
    }

    .context-box {
      display: grid;
      gap: 8px;
      margin-top: 2px;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
      color: #26323a;
      font-size: 14px;
      line-height: 1.45;
      font-weight: 520;
      white-space: pre-line;
    }

    .prompt-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .chips {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 6px;
      min-width: 0;
    }

    .score-chip {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 0 9px;
      border-radius: 999px;
      background: var(--surface);
      color: var(--muted);
      font-size: 12px;
      font-weight: 760;
      white-space: nowrap;
    }

    .choices {
      display: grid;
      gap: 8px;
    }

    .choice {
      display: grid;
      grid-template-columns: 36px minmax(0, 1fr);
      align-items: center;
      gap: 10px;
      min-height: 54px;
      padding: 9px 10px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #ffffff;
      color: var(--text);
      text-align: left;
    }

    .choice-letter {
      display: grid;
      place-items: center;
      width: 32px;
      height: 32px;
      border: 1px solid var(--line-strong);
      border-radius: 50%;
      background: #ffffff;
      font-size: 14px;
      font-weight: 760;
    }

    .choice-text {
      overflow-wrap: anywhere;
      font-size: 16px;
      line-height: 1.35;
      font-weight: 580;
    }

    .choice.is-selected {
      border-color: #7dc6c0;
      background: var(--teal-soft);
      box-shadow: inset 3px 0 0 var(--teal);
    }

    .choice.is-correct {
      border-color: #92cfa3;
      background: var(--green-soft);
      box-shadow: inset 3px 0 0 var(--green);
    }

    .choice.is-wrong {
      border-color: #edaaa4;
      background: var(--red-soft);
      box-shadow: inset 3px 0 0 var(--red);
    }

    .actions-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 48px;
      gap: 8px;
      align-items: center;
    }

    .text-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-width: 0;
      min-height: 46px;
      padding: 0 13px;
      border: 1px solid #69aaa4;
      border-radius: var(--radius);
      background: #ffffff;
      color: var(--teal-strong);
      font-size: 15px;
      font-weight: 760;
      white-space: nowrap;
    }

    .text-button.primary {
      border-color: var(--teal);
      background: var(--teal);
      color: #ffffff;
    }

    .text-button.warning {
      border-color: #e0b063;
      background: var(--amber-soft);
      color: #774600;
    }

    .text-button:disabled,
    .icon-button:disabled {
      cursor: default;
      opacity: 0.55;
      transform: none;
    }

    .explanation {
      display: none;
      gap: 10px;
      padding: 12px;
      border: 1px solid #cae4cf;
      border-radius: var(--radius);
      background: linear-gradient(180deg, #f1fbf3 0%, #ffffff 100%);
    }

    .explanation.is-visible {
      display: grid;
    }

    .explanation-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      font-size: 14px;
      font-weight: 780;
    }

    .result {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      color: var(--green);
    }

    .result.is-wrong {
      color: var(--red);
    }

    .explanation p {
      margin: 0;
      color: #27343c;
      font-size: 15px;
      line-height: 1.5;
      font-weight: 500;
    }

    .review-panel,
    .stats-panel {
      display: grid;
      gap: 12px;
      padding: 14px;
    }

    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .panel-title {
      margin: 0;
      font-size: 17px;
      line-height: 1.2;
      font-weight: 780;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .stat {
      display: grid;
      gap: 4px;
      min-height: 68px;
      padding: 10px 8px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
    }

    .stat strong {
      font-size: 21px;
      line-height: 1;
      font-weight: 780;
      font-variant-numeric: tabular-nums;
    }

    .stat span {
      color: var(--muted);
      font-size: 12px;
      font-weight: 680;
      line-height: 1.2;
    }

    .error-list {
      display: grid;
      gap: 7px;
    }

    .error-item {
      display: grid;
      grid-template-columns: 30px minmax(0, 1fr) auto;
      align-items: center;
      gap: 9px;
      min-height: 48px;
      padding: 8px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #ffffff;
      text-align: left;
    }

    .error-item strong {
      display: block;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 14px;
      font-weight: 740;
    }

    .error-item span {
      display: block;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--muted);
      font-size: 12px;
      font-weight: 620;
    }

    .empty {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.45;
      font-weight: 560;
    }

    .notes {
      width: 100%;
      min-height: 80px;
      resize: vertical;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #ffffff;
      color: var(--text);
      font-size: 15px;
      line-height: 1.4;
    }

    .notes:focus,
    .choice:focus-visible,
    .segment:focus-visible,
    .mode-button:focus-visible,
    .text-button:focus-visible,
    .icon-button:focus-visible,
    .dot:focus-visible,
    .error-item:focus-visible {
      outline: 3px solid rgba(8, 118, 109, 0.24);
      outline-offset: 2px;
    }

    .bottom-bar {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 30;
      display: grid;
      grid-template-columns: 1fr 1fr 1.15fr;
      gap: 8px;
      padding: 10px 16px calc(10px + var(--safe-bottom));
      border-top: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.97);
      backdrop-filter: blur(18px);
    }

    .bottom-bar .text-button {
      min-height: 48px;
      padding: 0 10px;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @media (min-width: 760px) {
      .app {
        padding-bottom: 0;
      }

      .content {
        grid-template-columns: minmax(0, 1fr) 300px;
        align-items: start;
        padding-bottom: 28px;
      }

      .question-panel {
        grid-row: span 3;
      }

      .bottom-bar {
        position: sticky;
        bottom: 0;
        width: min(100%, 920px);
        margin: 0 auto;
        border: 1px solid var(--line);
        border-radius: var(--radius) var(--radius) 0 0;
      }
    }

    @media (max-width: 430px) {
      .topbar {
        gap: 8px;
        padding-left: 12px;
        padding-right: 12px;
      }

      h1 {
        font-size: 18px;
      }

      .offline {
        height: 30px;
        padding: 0 8px;
        font-size: 12px;
      }

      .session,
      .segments,
      .modes,
      .content,
      .bottom-bar {
        padding-left: 12px;
        padding-right: 12px;
      }

      .segments,
      .modes,
      .bottom-bar {
        gap: 6px;
      }

      .segment,
      .mode-button {
        font-size: 13px;
      }

      .timer-card {
        gap: 6px;
        padding-left: 8px;
        padding-right: 8px;
      }

      .timer-value {
        font-size: 20px;
      }

      .question-head,
      .question-body {
        padding-left: 12px;
        padding-right: 12px;
      }

      .stem {
        font-size: 17px;
      }

      .bottom-bar .text-button {
        font-size: 14px;
      }
    }

    @media (prefers-reduced-motion: no-preference) {
      .choice,
      .segment,
      .mode-button,
      .text-button,
      .icon-button,
      .error-item {
        transition: transform 120ms ease, border-color 140ms ease, background 140ms ease, color 140ms ease;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <span class="brand-mark" aria-hidden="true">
          <svg width="19" height="19" viewBox="0 0 24 24" fill="none">
            <path d="M4 12h16M4 6h16M4 18h16" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
          </svg>
        </span>
        <div class="brand-title">
          <h1>Flight GMAT</h1>
          <span class="micro" id="saveState">Saved locally</span>
        </div>
      </div>
      <span class="offline" aria-label="Offline ready">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M3.5 13.5 21 5l-8.5 17-2-7-7-1.5Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
        </svg>
        Offline
      </span>
    </header>

    <div class="shell">
      <section class="session" aria-label="Timed Set">
        <button class="icon-button" id="pauseButton" aria-label="Pause timer"></button>
        <div class="timer-card">
          <div>
            <div class="timer-label">Timed Set</div>
            <div class="timer-progress" aria-hidden="true"><span id="timerProgress"></span></div>
          </div>
          <div class="timer-value" id="timerValue">24:00 <span>left</span></div>
        </div>
        <button class="icon-button" id="resetButton" aria-label="Reset section"></button>
      </section>

      <nav class="segments" aria-label="GMAT section">
        <button class="segment" data-section="Quant" aria-selected="true">Quant</button>
        <button class="segment" data-section="Verbal" aria-selected="false">Verbal</button>
        <button class="segment" data-section="DI" aria-selected="false">DI</button>
      </nav>

      <nav class="modes" aria-label="Practice mode">
        <button class="mode-button" data-mode="Adaptive" aria-selected="true">Adaptive</button>
        <button class="mode-button" data-mode="Marathon" aria-selected="false">Marathon</button>
        <button class="mode-button" data-mode="Review" aria-selected="false">Review</button>
      </nav>

      <main class="content">
        <section class="question-panel" aria-live="polite">
          <div class="question-head">
            <div class="question-topline">
              <div class="question-count" id="questionCount">Question 1 of 12</div>
              <div class="topic" id="questionTopic">Arithmetic</div>
            </div>
            <div class="progress-strip" id="progressStrip" style="--count: 12"></div>
          </div>

          <div class="question-body">
            <p class="stem" id="questionStem"></p>
            <div class="context-box" id="questionContext" hidden></div>
            <div class="prompt-row">
              <span id="promptLabel">Pick an answer</span>
              <span class="chips">
                <span class="score-chip" id="difficultyChip">Level 2</span>
                <span class="score-chip" id="scoreChip">0 correct</span>
              </span>
            </div>
            <div class="choices" id="choices"></div>
            <div class="actions-row">
              <button class="text-button" id="explainButton"></button>
              <button class="icon-button" id="flagButton" aria-label="Mark for review"></button>
            </div>
            <section class="explanation" id="explanation">
              <div class="explanation-head">
                <span class="result" id="resultLabel"></span>
                <span id="correctAnswer"></span>
              </div>
              <p id="explanationText"></p>
            </section>
          </div>
        </section>

        <section class="stats-panel" aria-label="Progress">
          <div class="panel-head">
            <h2 class="panel-title">Review</h2>
            <button class="text-button" id="reviewMissedButton">Missed</button>
          </div>
          <div class="stats-grid">
            <div class="stat"><strong id="doneStat">0</strong><span>answered</span></div>
            <div class="stat"><strong id="rightStat">0%</strong><span>accuracy</span></div>
            <div class="stat"><strong id="flagStat">L2</strong><span>level</span></div>

    function hashText(text) {
      let hash = 2166136261;
      for (let index = 0; index < text.length; index += 1) {
        hash ^= text.charCodeAt(index);
        hash = Math.imul(hash, 16777619);
      }
      return Math.abs(hash >>> 0);
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function dedupe(values) {
      const seen = new Set();
      return values
        .map((value) => String(value))
        .filter((value) => {
          if (seen.has(value)) return false;
          seen.add(value);
          return true;
        });
    }

    function packChoices(correct, distractors, seed) {
      const values = dedupe([correct, ...distractors]);
      let nudge = 1;
      while (values.length < 5) {
        const numeric = Number.parseFloat(String(correct).replace(/[^\d.-]/g, ""));
        values.push(Number.isFinite(numeric) ? String(numeric + nudge * 3) : `Choice ${values.length + 1}`);
        nudge += 1;
      }
      const trimmed = values.slice(0, 5);
      const ordered = trimmed
        .map((value) => ({ value, rank: hashText(`${seed}-${value}`) }))
        .sort((a, b) => a.rank - b.rank)
        .map((item) => item.value);
      return { choices: ordered, answer: ordered.indexOf(String(correct)) };
    }

      const packed = packChoices(correct, distractors, id);
      return {
        id,
        section,
        topic,
        stem,
        context,
        choices: packed.choices,
        answer: packed.answer,
        explanation,
        difficulty
      };
    }

        const combinations = chosen === 2 ? total * (total - 1) / 2 : total * (total - 1) * (total - 2) / 6;
        add(numericQuestion({
          id: `lq-c-${index}`,
          section: "Quant",
          topic: "Combinatorics",
          stem: `From ${total} distinct items, how many groups of ${chosen} can be selected if order does not matter?`,
          correct: combinations,
          distractors: [total * chosen, Math.max(1, combinations - total), combinations + total, total * (total - 1)],
          explanation: `Use combinations. ${total} choose ${chosen} = ${combinations}; order does not create new groups.`,
          difficulty: clamp(3 + Math.floor(index / 16), 3, 5)
        }));
      }

      const actors = ["airline", "retailer", "software company", "hospital", "bank", "delivery service", "university", "hotel chain", "fitness app", "manufacturer"];
      const plans = ["launching a mobile check-in tool", "offering a short-term discount", "adding reminder emails", "changing appointment slots", "using automated fraud alerts", "rerouting drivers with software", "moving lessons online", "bundling services", "adding progress streaks", "using a new production process"];
      const goals = ["increase repeat use", "raise profit", "reduce delays", "improve customer satisfaction", "lower operating costs", "increase retention", "reduce errors", "speed up onboarding"];
      const blockers = ["the plan's added cost will not exceed the financial gain", "customers who express interest will actually change their behavior", "the measured problem is caused by the factor the plan addresses", "the plan will not create a new bottleneck elsewhere", "the survey respondents are representative of the affected users"];
      const crTypes = ["assumption", "weaken", "strengthen", "evaluate", "explain"];
      for (let index = 0; index < 260; index += 1) {
        const actor = actors[index % actors.length];
        const plan = plans[(index * 3) % plans.length];
        const goal = goals[(index * 5) % goals.length];
        const blocker = blockers[(index * 7) % blockers.length];
        const type = crTypes[index % crTypes.length];
        let stem;
        let correct;
        let explanation;
        if (type === "assumption") {
          stem = `A ${actor} argues that ${plan} will ${goal}. Which assumption is required by the argument?`;
          correct = blocker.charAt(0).toUpperCase() + blocker.slice(1) + ".";
          explanation = `The conclusion depends on the plan causing the intended result without an offsetting issue. The required assumption is that ${blocker}.`;
        } else if (type === "weaken") {
          stem = `After ${plan}, a ${actor} found that one metric improved and concluded that the plan helped ${goal}. Which fact most weakens the conclusion?`;
          correct = `A separate change during the same period could have produced the improved metric without the plan.`;
          explanation = `This weakens the causal claim by giving an alternative explanation for the observed improvement.`;
        } else if (type === "strengthen") {
          stem = `A ${actor} predicts that ${plan} will ${goal}. Which evidence most strengthens the prediction?`;
          correct = `A comparable group exposed to the plan improved on the target outcome more than a similar group not exposed to the plan.`;
          explanation = `The answer strengthens the argument by directly connecting the plan to the outcome while controlling for comparison.`;
        } else if (type === "evaluate") {
          stem = `Before using ${plan} to ${goal}, what question should a ${actor} most want answered?`;
          correct = `Whether the main obstacle to ${goal} is the specific problem that the plan is designed to solve.`;
          explanation = `The most useful evaluation question tests whether the plan attacks the real constraint behind the goal.`;
        } else {
          stem = `A ${actor} expected that ${plan} would ${goal}. Instead, the target metric improved while total profit declined. Which fact best explains the result?`;
          correct = `The plan increased usage by low-margin customers while reducing purchases by higher-margin customers.`;
          explanation = `The apparent discrepancy is resolved by separating the target metric from profit: one can rise while the other falls.`;
        }
        const packed = packChoices(correct, [
          `The ${actor} recently changed its logo.`,
          `Some employees preferred the previous process for unrelated reasons.`,
          `The plan was announced before it was implemented.`,
          `Competitors use a different approach in another market.`
        ], `lv-cr-${index}`);
        add({
          id: `lv-cr-${index}`,
          section: "Verbal",
          topic: "Critical Reasoning",
          stem,
          choices: packed.choices,
          answer: packed.answer,
          explanation,
          difficulty: clamp(2 + (index % 4), 2, 5)
        });
      }

      const passageThemes = [
        ["warehouse automation", "robots increased picking speed but required clearer bin labeling", "automation gains depend on matching technology with process design"],
        ["remote training", "short modules improved completion but reduced peer discussion", "training design involves a trade-off between convenience and interaction"],
        ["airline pricing", "lower fares increased bookings but reduced ancillary purchases", "revenue effects can differ from demand effects"],
        ["urban transit", "express buses helped long trips but skipped some short-trip riders", "efficiency improvements can shift benefits across user groups"],
        ["medical triage", "software flagged urgent cases faster but created false alarms", "decision tools must balance speed with accuracy"],
        ["subscription products", "free trials increased signups but attracted lower-retention users", "customer quality matters as much as signup volume"],
        ["supply chains", "larger inventories reduced stockouts but tied up cash", "operational resilience can have financial costs"],
        ["data dashboards", "more metrics increased visibility but slowed decisions", "information systems should prioritize actionable signals"],
        ["energy storage", "batteries smoothed demand peaks but depended on local pricing rules", "technology value depends on economic context"],
        ["restaurant ordering", "kiosks reduced checkout lines but raised customization errors", "automation can move friction from one step to another"]
      ];
      for (let index = 0; index < 90; index += 1) {
        const [subject, evidence, thesis] = passageThemes[index % passageThemes.length];
        const kind = index % 3;
        const context = `A study of ${subject} found that ${evidence}. The authors did not conclude that the change was simply good or bad. Instead, they argued that ${thesis}, especially when managers use multiple performance measures rather than a single headline result.`;
        const stems = [
          "Which choice best states the main point of the passage?",
          "The passage most strongly implies that managers should",
          "The reference to a single headline result primarily serves to"
        ];
        const corrects = [
          thesis.charAt(0).toUpperCase() + thesis.slice(1) + ", so the change should be evaluated with more than one metric.",
          "evaluate the change using both its benefits and its trade-offs",
          "warn against judging a complex operational change by one metric alone"
        ];
        const packed = packChoices(corrects[kind], [
          `reject all uses of ${subject.split(" ")[0]} technology`,
          "focus only on the fastest-changing metric",
          "assume that any improvement in one metric guarantees a profit increase",
          "ignore implementation details because the broad trend is enough"
        ], `lv-rc-${index}`);
        add({
          id: `lv-rc-${index}`,
          section: "Verbal",
          topic: "Reading Comprehension",
          context,
          stem: stems[kind],
          choices: packed.choices,
          answer: packed.answer,
          explanation: `The passage is qualified: it identifies a benefit, a limitation, and a broader conclusion about evaluating trade-offs. The correct answer preserves that qualification.`,
          difficulty: clamp(2 + kind + Math.floor((index % 9) / 5), 2, 5)
        });
      }

      for (let index = 0; index < 90; index += 1) {
        const base = 100 + index * 3;
        const values = [base, base + 12 + (index % 9), base + 24 + ((index * 2) % 11), base + 8 + ((index * 5) % 17)];
        const increases = values.map((value, valueIndex) => value + 10 + ((index + valueIndex * 7) % 26));
        const growth = increases.map((value, valueIndex) => value - values[valueIndex]);
        const answer = growth.indexOf(Math.max(...growth));
        add({
          id: `ld-t-${index}`,
          section: "DI",
          topic: "Table Analysis",
          context: `Region | 2025 units | 2026 units\nA | ${values[0]} | ${increases[0]}\nB | ${values[1]} | ${increases[1]}\nC | ${values[2]} | ${increases[2]}\nD | ${values[3]} | ${increases[3]}`,
          stem: "Which region had the greatest absolute increase in units?",
          choices: ["Region A", "Region B", "Region C", "Region D", "All regions tie"],
          answer,
          explanation: `Compute 2026 units minus 2025 units for each region. The largest increase is for Region ${["A", "B", "C", "D"][answer]}.`,
          difficulty: clamp(1 + Math.floor(index / 24), 1, 5)
        });
      }

      for (let index = 0; index < 80; index += 1) {
        const fixed = 200 + (index % 13) * 20;
        const unit = 6 + (index % 7);
        const price = unit + 4 + (index % 5);
        const target = 80 + (index % 16) * 10;
        const profit = target * (price - unit) - fixed;
        add(numericQuestion({
          id: `ld-g-${index}`,
          section: "DI",
          topic: "Graphics Interpretation",
          context: `A product has fixed cost $${fixed}, variable cost $${unit} per unit, and selling price $${price} per unit.`,
          stem: `What is the profit from selling ${target} units?`,
          correct: profit,
          distractors: [target * price, target * unit, profit + fixed, profit - fixed],
          explanation: `Profit = revenue - variable cost - fixed cost = ${target}(${price}) - ${target}(${unit}) - ${fixed} = ${profit}.`,
          difficulty: clamp(2 + Math.floor(index / 22), 2, 5)
        }));
      }

      for (let index = 0; index < 80; index += 1) {
        const total = 60 + index * 2;
        const a = 20 + (index % 20);
        const b = 18 + ((index * 3) % 18);
        const both = 5 + (index % 10);
        const neither = total - (a + b - both);
        add(numericQuestion({
          id: `ld-s-${index}`,
          section: "DI",
          topic: "Sets",
          stem: `Among ${total} survey respondents, ${a} selected option A, ${b} selected option B, and ${both} selected both. How many selected neither option?`,
          correct: neither,
          distractors: [neither - 5, neither + 5, a + b - both, total - a - b],
          explanation: `Selected at least one = ${a} + ${b} - ${both} = ${a + b - both}. Neither = ${total} - ${a + b - both} = ${neither}.`,
          difficulty: clamp(2 + Math.floor(index / 22), 2, 5)
        }));
      }

      for (let index = 0; index < 90; index += 1) {
        const answerType = index % 5;
        let stem;
        let answer;
        let explanation;
        if (answerType === 0) {
          const sum = 36 + index * 2;
          stem = `What is the average of x, y, and z?\n(1) x + y + z = ${sum}\n(2) x = y`;
          answer = 0;
          explanation = `Statement (1) gives the total, so the average is determined. Statement (2) alone gives only a relationship.`;
        } else if (answerType === 1) {
          const value = 10 + index;
          stem = `Is x greater than ${value}?\n(1) x > ${value + 4}\n(2) x is positive`;
          answer = 0;
          explanation = `Statement (1) directly implies x > ${value}. Statement (2) allows values above and below ${value}.`;
        } else if (answerType === 2) {
          const divisor = 3 + (index % 7);
          stem = `Is integer n divisible by ${divisor * 2}?\n(1) n is divisible by ${divisor}\n(2) n is even`;
          answer = 2;
          explanation = `Neither statement alone guarantees both factors, but together they give divisibility by ${divisor} and by 2.`;
        } else if (answerType === 3) {
          const value = 12 + index;
          stem = `What is the value of x?\n(1) x + y = ${value}\n(2) y = ${Math.floor(value / 2)}`;
          answer = 2;
          explanation = `Neither statement alone determines x, but together x = ${value} - ${Math.floor(value / 2)}.`;
        } else {
          stem = `Is integer n odd?\n(1) n + 1 is even\n(2) 3n is odd`;
          answer = 3;
          explanation = `If n + 1 is even, n is odd. If 3n is odd, n is odd. Each statement alone is sufficient.`;
        }
        add({
          id: `ld-ds-${index}`,
          section: "DI",
          topic: "Data Sufficiency",
          stem,
          choices: dsChoices,
          answer,
          explanation,
          difficulty: clamp(2 + (index % 4), 2, 5)
        });
      }

      for (let index = 0; index < 60; index += 1) {
        const basicPrice = 10 + (index % 6);
        const premiumPrice = basicPrice + 8 + (index % 5);
        const premium = 15 + (index % 24);
        const basic = 40 + ((index * 2) % 35);
        const total = basic + premium;
        const revenue = basic * basicPrice + premium * premiumPrice;
        add(numericQuestion({
          id: `ld-tp-${index}`,
          section: "DI",
          topic: "Two-Part Analysis",
          context: `Basic price: $${basicPrice}\nPremium price: $${premiumPrice}\nTotal plans sold: ${total}\nTotal revenue: $${revenue}`,
          stem: "How many Premium plans were sold?",
          correct: premium,
          distractors: [premium - 6, premium - 3, premium + 4, basic],
          explanation: `Let p be Premium plans. Then ${premiumPrice}p + ${basicPrice}(${total} - p) = ${revenue}, so p = ${premium}.`,
          difficulty: clamp(3 + Math.floor(index / 20), 3, 5)
        }));
      }

      return questions;
    }

    BANK.forEach((question, index) => {
      question.difficulty = question.difficulty || clamp(1 + Math.floor((index % 12) / 3), 1, 5);
      question.source = "seed";
    });
    BANK.push(...buildQuantGeneratedBank(), ...buildVerbalGeneratedBank(), ...buildDIGeneratedBank(), ...buildLongFlightGeneratedBank());

    const SECTION_SECONDS = 90 * 60;
    const STORAGE_KEY = "flight-gmat-state-v2";
    const LETTERS = ["A", "B", "C", "D", "E"];
    const sections = ["Quant", "Verbal", "DI"];
    const modes = ["Adaptive", "Marathon", "Review"];
    const questionById = new Map(BANK.map((question) => [question.id, question]));
    const $ = (selector) => document.querySelector(selector);

    const defaultState = () => ({
      section: "Quant",
      mode: "Adaptive",
      indexBySection: { Quant: 0, Verbal: 0, DI: 0 },
      queueBySection: { Quant: [], Verbal: [], DI: [] },
      targetDifficulty: { Quant: 2, Verbal: 2, DI: 2 },
      streakBySection: { Quant: 0, Verbal: 0, DI: 0 },
      topicStats: {},
      answers: {},
      flagged: {},
      showExplanation: {},
      notes: "",
      paused: false,
      timers: { Quant: SECTION_SECONDS, Verbal: SECTION_SECONDS, DI: SECTION_SECONDS }
    });

    let state = loadState();
    let tickHandle = null;

    function loadState() {
      try {
        const stored = JSON.parse(localStorage.getItem(STORAGE_KEY));
        const base = defaultState();
        return Object.assign(base, stored || {}, {
          mode: modes.includes(stored?.mode) ? stored.mode : "Adaptive",
          indexBySection: Object.assign(base.indexBySection, stored?.indexBySection || {}),
          queueBySection: Object.assign(base.queueBySection, stored?.queueBySection || {}),
          targetDifficulty: Object.assign(base.targetDifficulty, stored?.targetDifficulty || {}),
          streakBySection: Object.assign(base.streakBySection, stored?.streakBySection || {}),
          topicStats: stored?.topicStats || {},
          answers: stored?.answers || {},
          flagged: stored?.flagged || {},
          showExplanation: stored?.showExplanation || {},
          timers: Object.assign(base.timers, stored?.timers || {})
        });
      } catch (_) {
        return defaultState();
      }
    }

    function saveState() {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
        $("#saveState").textContent = "Saved locally";
      } catch (_) {
        $("#saveState").textContent = "Session active";
      }
    }

    function bySection(section = state.section) {
      return BANK
        .filter((q) => q.section === section)
        .sort((a, b) => a.difficulty - b.difficulty || a.topic.localeCompare(b.topic) || a.id.localeCompare(b.id));
    }

    function cleanQueue(section = state.section) {
      const validIds = new Set(bySection(section).map((question) => question.id));
      state.queueBySection[section] = (state.queueBySection[section] || []).filter((id) => validIds.has(id));
      return state.queueBySection[section];
    }

    function topicWeakness(topic) {
      const stats = state.topicStats[topic];
      if (!stats) return 0;
      return Math.max(0, (stats.wrong || 0) - (stats.correct || 0));
    }

    function pickAdaptiveQuestion(section = state.section) {
      const queue = cleanQueue(section);
      const lastId = queue[queue.length - 1];
      const all = bySection(section);
      const unanswered = all.filter((question) => !state.answers[question.id]);
      const pool = (unanswered.length ? unanswered : all).filter((question) => question.id !== lastId);
      const candidates = pool.length ? pool : all;
      const target = state.targetDifficulty[section] || 2;
      return candidates
        .map((question) => {
          const answeredPenalty = state.answers[question.id] ? 42 : 0;
          const queuePenalty = queue.includes(question.id) ? 18 : 0;
          const weakTopicBonus = topicWeakness(question.topic) * 8;
          const jitter = hashText(`${question.id}-${queue.length}`) % 7;
          return {
            question,
            score: Math.abs(question.difficulty - target) * 20 + answeredPenalty + queuePenalty + jitter - weakTopicBonus
          };
        })
        .sort((a, b) => a.score - b.score || a.question.id.localeCompare(b.question.id))[0]?.question;
    }

    function ensureAdaptiveQueue(section = state.section) {
      cleanQueue(section);
      if (!state.queueBySection[section].length) {
        const first = pickAdaptiveQuestion(section);
        if (first) state.queueBySection[section].push(first.id);
      }
      const queue = state.queueBySection[section];
      const maxIndex = Math.max(0, queue.length - 1);
      state.indexBySection[section] = clamp(state.indexBySection[section] || 0, 0, maxIndex);
      return queue.map((id) => questionById.get(id)).filter(Boolean);
    }

    function currentList() {
      if (state.mode === "Adaptive") return ensureAdaptiveQueue();
      if (state.mode === "Review") {
        const reviewList = bySection().filter((q) => state.flagged[q.id] || (state.answers[q.id] && !state.answers[q.id].correct));
        return reviewList.length ? reviewList : bySection().filter((q) => state.answers[q.id]).slice(0, 24).concat(bySection().slice(0, 1)).slice(0, 24);
      }
      return bySection();
    }

    function currentQuestion() {
      const list = currentList();
      const index = Math.min(state.indexBySection[state.section] || 0, list.length - 1);
      state.indexBySection[state.section] = index;
      return list[index];
    }

    function currentIndex() {
      return state.indexBySection[state.section] || 0;
    }

    function setIndex(index) {
      const list = currentList();
      state.indexBySection[state.section] = Math.max(0, Math.min(index, list.length - 1));
      saveState();
      render();
    }

    function statsFor(section = state.section) {
      const list = bySection(section);
      const answered = list.filter((q) => state.answers[q.id]).length;
      const correct = list.filter((q) => state.answers[q.id]?.correct).length;
      const flagged = list.filter((q) => state.flagged[q.id]).length;
      const wrong = list.filter((q) => state.answers[q.id] && !state.answers[q.id].correct).length;
      const accuracy = answered ? Math.round((correct / answered) * 100) : 0;
      return { answered, correct, flagged, wrong, total: list.length, accuracy };
    }

    function formatTime(seconds) {
      const value = Math.max(0, seconds);
      const minutes = Math.floor(value / 60);
      const remainingSeconds = value % 60;
      return `${minutes}:${String(remainingSeconds).padStart(2, "0")}`;
    }

    function renderTimer() {
      const remaining = state.timers[state.section] ?? SECTION_SECONDS;
      $("#timerValue").innerHTML = `${formatTime(remaining)} <span>left</span>`;
      $("#timerProgress").style.transform = `scaleX(${Math.max(0, remaining / SECTION_SECONDS)})`;
      $("#pauseButton").innerHTML = state.paused ? icon.play : icon.pause;
      $("#pauseButton").setAttribute("aria-label", state.paused ? "Resume timer" : "Pause timer");
      $("#resetButton").innerHTML = icon.reset;
    }

    function renderSegments() {
      document.querySelectorAll(".segment").forEach((button) => {
        button.setAttribute("aria-selected", String(button.dataset.section === state.section));
      });
    }

    function renderModes() {
      document.querySelectorAll(".mode-button").forEach((button) => {
        button.setAttribute("aria-selected", String(button.dataset.mode === state.mode));
      });
    }

    function renderProgress(list) {
      const strip = $("#progressStrip");
      const index = currentIndex();
      const windowSize = Math.min(12, list.length);
      const start = Math.max(0, Math.min(index - 5, list.length - windowSize));
      const visible = list.slice(start, start + windowSize);
      strip.style.setProperty("--count", visible.length || 1);
      strip.innerHTML = "";
      visible.forEach((question, offset) => {
        const absoluteIndex = start + offset;
        const answer = state.answers[question.id];
        const button = document.createElement("button");
        button.className = "dot";
        if (absoluteIndex === index) button.classList.add("is-current");
        if (answer?.correct) button.classList.add("is-correct");
        if (answer && !answer.correct) button.classList.add("is-wrong");
        if (state.flagged[question.id]) button.classList.add("is-flagged");
        button.type = "button";
        button.setAttribute("aria-label", `Go to question ${absoluteIndex + 1}`);
        button.addEventListener("click", () => setIndex(absoluteIndex));
        strip.appendChild(button);
      });
    }

    function renderChoices(question) {
      const choices = $("#choices");
      const answer = state.answers[question.id];
      const show = Boolean(state.showExplanation[question.id]);
      choices.innerHTML = "";
      question.choices.forEach((choice, index) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "choice";
        if (answer?.choice === index) button.classList.add("is-selected");
        if (show && index === question.answer) button.classList.add("is-correct");
        if (show && answer?.choice === index && !answer.correct) button.classList.add("is-wrong");
        button.innerHTML = `<span class="choice-letter">${LETTERS[index]}</span><span class="choice-text">${choice}</span>`;
        button.addEventListener("click", () => chooseAnswer(question, index));
        choices.appendChild(button);
      });
    }

    function renderExplanation(question) {
      const answer = state.answers[question.id];
      const isVisible = Boolean(answer && state.showExplanation[question.id]);
      const explanation = $("#explanation");
      explanation.classList.toggle("is-visible", isVisible);
      $("#explainButton").disabled = !answer;
      $("#explainButton").innerHTML = answer ? `${icon.eye} ${isVisible ? "Hide explanation" : "Show explanation"}` : `${icon.eye} Answer first`;
      if (answer?.correct) {
        $("#resultLabel").className = "result";
        $("#resultLabel").innerHTML = `${icon.check} Correct`;
      } else {
        $("#resultLabel").className = "result is-wrong";
        $("#resultLabel").innerHTML = `${icon.x} Review this`;
      }
      $("#correctAnswer").textContent = `Answer: ${LETTERS[question.answer]}`;
      $("#explanationText").textContent = question.explanation;
    }

    function renderErrorLog() {
      const list = bySection();
      const missed = list.filter((q) => state.answers[q.id] && !state.answers[q.id].correct);
      const container = $("#errorList");
      container.innerHTML = "";
      if (!missed.length) {
        const empty = document.createElement("p");
        empty.className = "empty";
        empty.textContent = "Missed questions will appear here as you practice.";
        container.appendChild(empty);
        return;
      }
      missed.forEach((question) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "error-item";
        const index = list.findIndex((q) => q.id === question.id);
        button.innerHTML = `
          <span class="tiny-icon" style="color: var(--red)">${icon.x}</span>
          <span><strong>Q${index + 1} - ${question.topic}</strong><span>${question.stem}</span></span>
          <span class="tiny-icon" aria-hidden="true">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none"><path d="m9 18 6-6-6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </span>
        `;
        button.addEventListener("click", () => {
          state.mode = "Review";
          const reviewIndex = currentList().findIndex((q) => q.id === question.id);
          state.indexBySection[state.section] = Math.max(0, reviewIndex);
          state.showExplanation[question.id] = true;
          saveState();
          render();
          window.scrollTo({ top: 0, behavior: "smooth" });
        });
        container.appendChild(button);
      });
    }

    function renderStats() {
      const stats = statsFor();
      const target = state.targetDifficulty[state.section] || 2;
      $("#doneStat").textContent = `${stats.answered}/${stats.total}`;
      $("#rightStat").textContent = `${stats.accuracy}%`;
      $("#flagStat").textContent = `L${target}`;
      $("#difficultyChip").textContent = `Target L${target}`;
      $("#scoreChip").textContent = `${stats.correct}/${stats.answered || 0}`;
      $("#reviewMissedButton").textContent = stats.wrong ? `Missed ${stats.wrong}` : "Missed";
    }

    function render() {
      const list = currentList();
      const question = currentQuestion();
      const index = currentIndex();
      const answer = state.answers[question.id];

      renderTimer();
      renderSegments();
      renderModes();
      renderProgress(list);
      renderStats();

      $("#questionCount").textContent = state.mode === "Adaptive" ? `Question ${index + 1} · Level ${state.targetDifficulty[state.section] || 2}` : `Question ${index + 1} of ${list.length}`;
      $("#questionTopic").textContent = `${question.topic} · L${question.difficulty}`;
      $("#questionStem").textContent = question.stem;
      $("#questionContext").hidden = !question.context;
      $("#questionContext").textContent = question.context || "";
      $("#flagButton").innerHTML = state.flagged[question.id] ? icon.flagFilled : icon.flag;
      $("#reviewButton").innerHTML = `${state.flagged[question.id] ? icon.flagFilled : icon.flag} Review`;

      renderChoices(question);
      renderExplanation(question);
      renderErrorLog();

      $("#previousButton").disabled = index === 0;
      $("#nextButton").textContent = state.mode === "Adaptive" || index < list.length - 1 ? "Next" : "Finish";
      $("#notes").value = state.notes || "";

      if (answer && !state.showExplanation[question.id]) {
        $("#explainButton").classList.add("primary");
      } else {
        $("#explainButton").classList.remove("primary");
      }
    }

    function chooseAnswer(question, choice) {
      const previous = state.answers[question.id];
      const correct = choice === question.answer;
      state.answers[question.id] = {
        choice,
        correct,
        section: question.section,
        topic: question.topic,
        difficulty: question.difficulty,
        at: Date.now()
      };
      if (!previous) updateAdaptiveDifficulty(question, correct);
      state.showExplanation[question.id] = true;
      saveState();
      render();
    }

    function updateAdaptiveDifficulty(question, correct) {
      const section = question.section;
      const topicStats = state.topicStats[question.topic] || { correct: 0, wrong: 0 };
      if (correct) topicStats.correct += 1;
      else topicStats.wrong += 1;
      state.topicStats[question.topic] = topicStats;

      const previousTarget = state.targetDifficulty[section] || 2;
      if (correct) {
        state.streakBySection[section] = (state.streakBySection[section] || 0) + 1;
        const shouldRaise = state.streakBySection[section] >= 2 || question.difficulty > previousTarget;
        state.targetDifficulty[section] = clamp(previousTarget + (shouldRaise ? 1 : 0), 1, 5);
      } else {
        state.streakBySection[section] = 0;
        state.targetDifficulty[section] = clamp(previousTarget - 1, 1, 5);
      }
    }

    function toggleFlag() {
      const question = currentQuestion();
      state.flagged[question.id] = !state.flagged[question.id];
      if (!state.flagged[question.id]) delete state.flagged[question.id];
      saveState();
      render();
    }

    function startTimer() {
      clearInterval(tickHandle);
      tickHandle = setInterval(() => {
        if (state.paused) return;
        const remaining = state.timers[state.section] ?? SECTION_SECONDS;
        if (remaining <= 0) return;
        state.timers[state.section] = remaining - 1;
        renderTimer();
        if (remaining % 10 === 0) saveState();
      }, 1000);
    }

    function resetSection() {
      const list = bySection();
      list.forEach((question) => {
        delete state.answers[question.id];
        delete state.flagged[question.id];
        delete state.showExplanation[question.id];
      });
      state.indexBySection[state.section] = 0;
      state.queueBySection[state.section] = [];
      state.targetDifficulty[state.section] = 2;
      state.streakBySection[state.section] = 0;
      state.timers[state.section] = SECTION_SECONDS;
      state.paused = false;
      saveState();
      render();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function jumpToMissed() {
      const previousMode = state.mode;
      state.mode = "Review";
      const list = currentList();
      const index = list.findIndex((q) => state.answers[q.id] && !state.answers[q.id].correct);
      if (index >= 0) {
        state.indexBySection[state.section] = index;
        state.showExplanation[list[index].id] = true;
        saveState();
        render();
        window.scrollTo({ top: 0, behavior: "smooth" });
      } else {
        state.mode = previousMode;
        saveState();
        render();
      }
    }

    document.querySelectorAll(".segment").forEach((button) => {
      button.addEventListener("click", () => {
        state.section = button.dataset.section;
        const list = currentList();
        state.indexBySection[state.section] = clamp(state.indexBySection[state.section] || 0, 0, Math.max(0, list.length - 1));
        saveState();
        render();
        window.scrollTo({ top: 0, behavior: "smooth" });
      });
    });

    document.querySelectorAll(".mode-button").forEach((button) => {
      button.addEventListener("click", () => {
        state.mode = button.dataset.mode;
        const list = currentList();
        state.indexBySection[state.section] = clamp(state.indexBySection[state.section] || 0, 0, Math.max(0, list.length - 1));
        saveState();
        render();
        window.scrollTo({ top: 0, behavior: "smooth" });
      });
    });

    $("#pauseButton").addEventListener("click", () => {
      state.paused = !state.paused;
      saveState();
      render();
    });

    $("#resetButton").addEventListener("click", resetSection);
    $("#flagButton").addEventListener("click", toggleFlag);
    $("#reviewButton").addEventListener("click", toggleFlag);

    $("#explainButton").addEventListener("click", () => {
      const question = currentQuestion();
      if (!state.answers[question.id]) return;
      state.showExplanation[question.id] = !state.showExplanation[question.id];
      saveState();
      render();
    });

    $("#previousButton").addEventListener("click", () => setIndex(currentIndex() - 1));
    $("#nextButton").addEventListener("click", () => {
      const list = currentList();
      if (state.mode === "Adaptive" && currentIndex() === list.length - 1) {
        const next = pickAdaptiveQuestion();
        if (next) {
          state.queueBySection[state.section].push(next.id);
          state.indexBySection[state.section] = state.queueBySection[state.section].length - 1;
          saveState();
          render();
          window.scrollTo({ top: 0, behavior: "smooth" });
        }
        return;
      }
      if (currentIndex() === list.length - 1) {
        state.paused = true;
        saveState();
        render();
        window.scrollTo({ top: document.body.scrollHeight, behavior: "smooth" });
        return;
      }
      setIndex(currentIndex() + 1);
      window.scrollTo({ top: 0, behavior: "smooth" });
    });

    $("#reviewMissedButton").addEventListener("click", jumpToMissed);
    $("#clearLogButton").addEventListener("click", () => {
      bySection().forEach((question) => {
        if (state.answers[question.id] && !state.answers[question.id].correct) {
          delete state.answers[question.id];
          delete state.showExplanation[question.id];
        }
      });
      saveState();
      render();
    });

    $("#notes").addEventListener("input", (event) => {
      state.notes = event.target.value;
      saveState();
    });

    $("#clearNotesButton").addEventListener("click", () => {
      state.notes = "";
      saveState();
      render();
    });

    window.addEventListener("pagehide", saveState);
    render();
    startTimer();
  </script>
</body>
</html>
