<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Flight GMAT">
  <meta name="theme-color" content="#071515">
  <title>Flight GMAT</title>
  <style>
    :root {
      --bg: #f5f8f8;
      --cockpit: #071515;
      --cockpit-2: #0d2322;
      --surface: #f7faf9;
      --surface-strong: #eaf5f3;
      --text: #172027;
      --muted: #5e6d73;
      --line: #d3dcdf;
      --line-strong: #aebdc3;
      --teal: #087a75;
      --teal-strong: #055d59;
      --teal-soft: #e2f4f2;
      --amber: #b66a00;
      --amber-soft: #fff1d8;
      --red: #c3332b;
      --red-soft: #fff0ee;
      --green: #177c3f;
      --green-soft: #e8f7ec;
      --shadow: 0 14px 34px rgba(15, 29, 33, 0.09);
      --radius: 8px;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: var(--text);
      background: var(--bg);
    }

    * {
      box-sizing: border-box;
    }

    [hidden] {
      display: none !important;
    }

    html {
      background: var(--bg);
      min-height: 100%;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      letter-spacing: 0;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    button,
    input,
    textarea {
      font: inherit;
    }

    button {
      border: 0;
      background: transparent;
      color: inherit;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .app {
      min-height: 100vh;
      padding-bottom: calc(88px + var(--safe-bottom));
      background:
        linear-gradient(180deg, var(--cockpit) 0 104px, var(--bg) 104px 100%);
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      min-height: 90px;
      padding: calc(18px + env(safe-area-inset-top, 0px)) 16px 18px;
      border-bottom: 1px solid rgba(147, 173, 172, 0.34);
      background:
        repeating-linear-gradient(90deg, transparent 0 30px, rgba(255, 255, 255, 0.045) 30px 31px),
        linear-gradient(135deg, var(--cockpit) 0%, var(--cockpit-2) 100%);
      color: #ffffff;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      flex: 1 1 auto;
      min-width: 0;
    }

    .brand-mark,
    .icon-button,
    .tiny-icon {
      display: inline-grid;
      place-items: center;
      flex: 0 0 auto;
    }

    .brand-mark {
      width: 128px;
      height: 34px;
      color: #ffffff;
      overflow: hidden;
    }

    .brand-mark svg {
      display: block;
      width: 100%;
      height: 100%;
    }

    .brand-title {
      display: grid;
      gap: 1px;
      min-width: 0;
    }

    h1 {
      margin: 0;
      font-size: 26px;
      line-height: 1.05;
      font-style: italic;
      font-weight: 820;
      letter-spacing: 0;
      white-space: nowrap;
    }

    h1 strong {
      color: #26b7ae;
      font-weight: 850;
    }

    .micro {
      color: #9db4b4;
      font-size: 12px;
      line-height: 1.2;
      font-weight: 650;
    }

    .offline {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 46px;
      padding: 7px 10px;
      border: 1px solid rgba(178, 208, 206, 0.5);
      border-radius: 7px;
      color: #d8f6f3;
      background: rgba(255, 255, 255, 0.045);
      font-size: 12px;
      font-weight: 780;
      flex: 0 0 auto;
      white-space: nowrap;
    }

    .offline small {
      display: block;
      color: #68e477;
      font-size: 11px;
      font-weight: 760;
      line-height: 1.15;
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #58db65;
      box-shadow: 0 0 0 4px rgba(88, 219, 101, 0.14);
    }

    .shell {
      width: min(100%, 920px);
      margin: 0 auto;
    }

    .session {
      min-width: 0;
      margin: 14px 16px 0;
      padding: 0;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #ffffff;
      box-shadow: 0 8px 24px rgba(15, 29, 33, 0.06);
    }

    .flight-plan {
      width: 100%;
    }

    .flight-plan > summary {
      list-style: none;
    }

    .flight-plan > summary::-webkit-details-marker {
      display: none;
    }

    .plan-summary {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto 22px;
      align-items: center;
      gap: 10px;
      min-height: 66px;
      padding: 12px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .plan-copy {
      display: grid;
      gap: 5px;
      min-width: 0;
    }

    .plan-copy strong {
      overflow: hidden;
      color: var(--text);
      font-size: 18px;
      line-height: 1.05;
      font-weight: 820;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .summary-chevron {
      display: inline-grid;
      place-items: center;
      color: var(--muted);
      transition: transform 140ms ease;
    }

    .flight-plan[open] .summary-chevron {
      transform: rotate(180deg);
    }

    .plan-summary .timer-progress {
      grid-column: 1 / -1;
      margin-top: 0;
    }

    .plan-controls {
      display: grid;
      gap: 10px;
      padding: 0 12px 12px;
      border-top: 1px solid var(--line);
    }

    .plan-actions {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      padding-top: 10px;
    }

    .icon-button {
      width: 46px;
      height: 46px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      color: var(--text);
      background: var(--surface);
    }

    .icon-button:active,
    .text-button:active,
    .choice:active,
    .segment:active,
    .mode-button:active {
      transform: translateY(1px);
    }

    .timer-card {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: center;
      gap: 10px;
      min-height: 44px;
      padding: 9px 11px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #ffffff;
    }

    .timer-label {
      color: var(--teal-strong);
      font-size: 11px;
      font-weight: 680;
      line-height: 1;
    }

    .timer-value {
      display: inline-flex;
      align-items: baseline;
      gap: 6px;
      min-width: 0;
      color: var(--amber);
      font-variant-numeric: tabular-nums;
      font-size: 22px;
      line-height: 1;
      font-weight: 780;
    }

    .timer-value span {
      color: var(--muted);
      font-size: 12px;
      font-weight: 650;
    }

    .timer-progress {
      height: 4px;
      margin-top: 7px;
      border-radius: 999px;
      background: #e6ecef;
      overflow: hidden;
    }

    .timer-progress > span {
      display: block;
      height: 100%;
      width: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--teal), #2d9e70, var(--amber));
      transform-origin: left center;
    }

    .segments {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 0;
      margin: 0;
      padding: 0;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      overflow: hidden;
      background: rgba(255, 255, 255, 0.96);
      backdrop-filter: blur(18px);
    }

    .segment {
      min-width: 0;
      min-height: 54px;
      border-right: 1px solid var(--line);
      color: var(--muted);
      background: #ffffff;
      font-size: 13px;
      line-height: 1;
      font-weight: 800;
      white-space: nowrap;
    }

    .segment:last-child {
      border-right: 0;
    }

    .segment,
    .mode-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
    }

    .segment svg,
    .mode-button svg {
      flex: 0 0 auto;
    }

    .segment span,
    .mode-button span {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .segment[aria-selected="true"] {
      color: #ffffff;
      background:
        linear-gradient(135deg, #087a75 0%, #075e5c 100%);
      box-shadow: inset 0 -3px 0 rgba(255, 255, 255, 0.25);
    }

    .modes {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 0;
      margin: 0;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      overflow: hidden;
      background: #ffffff;
    }

    .mode-button {
      min-width: 0;
      min-height: 46px;
      border-right: 1px solid var(--line);
      color: var(--muted);
      background: #ffffff;
      font-size: 13px;
      line-height: 1;
      font-weight: 760;
    }

    .mode-button:last-child {
      border-right: 0;
    }

    .mode-button[aria-selected="true"] {
      border-color: var(--line);
      color: #774600;
      background: linear-gradient(180deg, var(--amber-soft) 0%, #ffffff 100%);
      box-shadow: inset 0 -3px 0 var(--amber);
    }

    .content {
      display: grid;
      gap: 14px;
      padding: 14px 16px 0;
    }

    .question-panel,
    .review-panel,
    .stats-panel {
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #ffffff;
      box-shadow: var(--shadow);
    }

    .question-panel {
      position: relative;
      overflow: hidden;
      border-color: #c5d5d8;
    }

    .question-panel::before {
      content: "";
      display: block;
      height: 4px;
      background: linear-gradient(90deg, var(--teal), var(--amber));
    }

    .question-head {
      display: grid;
      gap: 8px;
      padding: 14px 14px 12px;
      border-bottom: 1px solid var(--line);
      background:
        repeating-linear-gradient(90deg, rgba(8, 122, 117, 0.08) 0 1px, transparent 1px 54px),
        linear-gradient(180deg, #edf8f7 0%, #ffffff 100%);
    }

    .question-topline {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      min-width: 0;
    }

    .question-count {
      font-size: 14px;
      font-weight: 820;
      line-height: 1.2;
    }

    .topic {
      max-width: 52%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--muted);
      font-size: 12px;
      font-weight: 680;
      text-align: right;
    }

    .progress-strip {
      position: relative;
      display: grid;
      grid-template-columns: repeat(var(--count), minmax(14px, 1fr));
      gap: 0;
      align-items: center;
      padding: 9px 0 8px;
    }

    .progress-strip::before {
      content: "";
      position: absolute;
      left: 8px;
      right: 8px;
      top: 50%;
      height: 2px;
      background: repeating-linear-gradient(90deg, #9fb0b6 0 9px, transparent 9px 16px);
      transform: translateY(-50%);
    }

    .dot {
      position: relative;
      min-width: 0;
      height: 26px;
      border: 0;
      border-radius: 0;
      background: transparent;
    }

    .dot::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      width: 9px;
      height: 9px;
      border: 2px solid #acbac0;
      border-radius: 50%;
      background: #ffffff;
      transform: translate(-50%, -50%);
    }

    .dot.is-current {
      color: var(--teal);
      outline: 0;
    }

    .dot.is-current::before {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      z-index: 1;
      width: 24px;
      height: 16px;
      background: currentColor;
      clip-path: polygon(0 43%, 58% 43%, 72% 7%, 82% 7%, 79% 43%, 100% 43%, 100% 57%, 79% 57%, 82% 93%, 72% 93%, 58% 57%, 0 57%);
      transform: translate(-50%, -50%);
    }

    .dot.is-current::after {
      display: none;
    }

    .dot.is-correct::after {
      background: var(--green);
      border-color: var(--green);
    }

    .dot.is-wrong::after {
      background: var(--red);
      border-color: var(--red);
    }

    .dot.is-flagged::before {
      content: "";
      position: absolute;
      top: 3px;
      right: 3px;
      width: 5px;
      height: 5px;
      border-radius: 999px;
      background: var(--amber);
    }

    .question-body {
      display: grid;
      gap: 14px;
      padding: 16px 14px 14px;
    }

    .stem {
      margin: 0;
      color: var(--text);
      font-size: 18px;
      line-height: 1.48;
      font-weight: 640;
    }

    .context-box {
      display: grid;
      gap: 8px;
      margin-top: 2px;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
      color: #26323a;
      font-size: 14px;
      line-height: 1.45;
      font-weight: 520;
      white-space: pre-line;
    }

    .prompt-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .chips {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 6px;
      min-width: 0;
    }

    .score-chip {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      max-width: 100%;
      padding: 0 9px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #ffffff;
      color: var(--muted);
      font-size: 12px;
      font-weight: 760;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .choices {
      display: grid;
      gap: 0;
      border-top: 1px solid var(--line);
    }

    .choice {
      display: grid;
      grid-template-columns: 36px minmax(0, 1fr);
      align-items: center;
      gap: 10px;
      min-height: 58px;
      padding: 10px 2px;
      border-bottom: 1px solid var(--line);
      border-radius: 0;
      background: #ffffff;
      color: var(--text);
      text-align: left;
    }

    .choice:last-child {
      border-bottom: 0;
    }

    .choice-letter {
      display: grid;
      place-items: center;
      width: 30px;
      height: 30px;
      border: 2px solid var(--line-strong);
      border-radius: 50%;
      background: #ffffff;
      font-size: 14px;
      font-weight: 760;
    }

    .choice-text {
      overflow-wrap: anywhere;
      font-size: 16px;
      line-height: 1.35;
      font-weight: 580;
    }

    .choice.is-selected {
      background: var(--teal-soft);
      box-shadow: inset 3px 0 0 var(--teal);
    }

    .choice.is-selected .choice-letter {
      border-color: var(--teal);
      color: var(--teal-strong);
    }

    .choice.is-correct {
      background: var(--green-soft);
      box-shadow: inset 3px 0 0 var(--green);
    }

    .choice.is-correct .choice-letter {
      border-color: var(--green);
      color: var(--green);
    }

    .choice.is-wrong {
      background: var(--red-soft);
      box-shadow: inset 3px 0 0 var(--red);
    }

    .choice.is-wrong .choice-letter {
      border-color: var(--red);
      color: var(--red);
    }

    .actions-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 48px;
      gap: 8px;
      align-items: center;
    }

    .text-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-width: 0;
      min-height: 46px;
      padding: 0 13px;
      border: 1px solid #69aaa4;
      border-radius: var(--radius);
      background: #ffffff;
      color: var(--teal-strong);
      font-size: 15px;
      font-weight: 760;
      white-space: nowrap;
    }

    .text-button.primary {
      border-color: var(--teal);
      background: var(--teal);
      color: #ffffff;
    }

    .text-button.warning {
      border-color: #e0b063;
      background: var(--amber-soft);
      color: #774600;
    }

    .text-button:disabled,
    .icon-button:disabled {
      cursor: default;
      opacity: 0.55;
      transform: none;
    }

    .explanation {
      display: none;
      gap: 10px;
      padding: 12px;
      border: 1px solid #cae4cf;
      border-radius: var(--radius);
      background: linear-gradient(180deg, #f1fbf3 0%, #ffffff 100%);
    }

    .explanation.is-visible {
      display: grid;
    }

    .explanation.is-locked {
      border-style: dashed;
      border-color: #c7d0d5;
      background: #f8fafb;
    }

    .explanation-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      font-size: 14px;
      font-weight: 780;
    }

    .result {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      color: var(--green);
    }

    .result.is-locked {
      color: var(--muted);
    }

    .result.is-wrong {
      color: var(--red);
    }

    .explanation p {
      margin: 0;
      color: #27343c;
      font-size: 15px;
      line-height: 1.5;
      font-weight: 500;
    }

    .review-panel {
      display: grid;
      gap: 12px;
      padding: 14px;
    }

    .stats-panel {
      display: grid;
      gap: 0;
      overflow: hidden;
      padding: 0;
    }

    .stats-panel .panel-head {
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      background: var(--surface);
    }

    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .panel-title {
      margin: 0;
      font-size: 17px;
      line-height: 1.2;
      font-weight: 780;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 0;
    }

    .stat {
      display: grid;
      gap: 4px;
      min-height: 72px;
      padding: 10px 8px;
      border-right: 1px solid var(--line);
      background: #ffffff;
      text-align: center;
    }

    .stat:last-child {
      border-right: 0;
    }

    .stat strong {
      font-size: 21px;
      line-height: 1;
      font-weight: 780;
      font-variant-numeric: tabular-nums;
    }

    .stat span {
      color: var(--muted);
      font-size: 12px;
      font-weight: 680;
      line-height: 1.2;
    }

    .error-list {
      display: grid;
      gap: 7px;
    }

    .error-item {
      display: grid;
      grid-template-columns: 30px minmax(0, 1fr) auto;
      align-items: center;
      gap: 9px;
      min-height: 48px;
      padding: 8px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #ffffff;
      text-align: left;
    }

    .error-item strong {
      display: block;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 14px;
      font-weight: 740;
    }

    .error-item span {
      display: block;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--muted);
      font-size: 12px;
      font-weight: 620;
    }

    .empty {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.45;
      font-weight: 560;
    }

    .notes {
      width: 100%;
      min-height: 80px;
      resize: vertical;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #ffffff;
      color: var(--text);
      font-size: 15px;
      line-height: 1.4;
    }

    .notes:focus,
    .choice:focus-visible,
    .segment:focus-visible,
    .mode-button:focus-visible,
    .text-button:focus-visible,
    .icon-button:focus-visible,
    .dot:focus-visible,
    .error-item:focus-visible {
      outline: 3px solid rgba(8, 118, 109, 0.24);
      outline-offset: 2px;
    }

    .bottom-bar {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 30;
      display: grid;
      grid-template-columns: 1fr 1.25fr;
      gap: 8px;
      padding: 10px 16px calc(10px + var(--safe-bottom));
      border-top: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.97);
      backdrop-filter: blur(18px);
      box-shadow: 0 -12px 28px rgba(15, 29, 33, 0.08);
    }

    .bottom-bar .text-button {
      min-height: 48px;
      padding: 0 10px;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @media (min-width: 760px) {
      .app {
        padding-bottom: 0;
      }

      .content {
        grid-template-columns: minmax(0, 1fr) 300px;
        align-items: start;
        padding-bottom: 28px;
      }

      .question-panel {
        grid-row: span 3;
      }

      .bottom-bar {
        position: sticky;
        bottom: 0;

<body>
  <div class="app">
    <header class="topbar">

                <path d="m6 9 6 6 6-6" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>

          <div class="plan-controls">

              <button class="text-button" id="resetButton" aria-label="Reset section"></button>

            <nav class="segments" aria-label="GMAT section">

              <button class="segment" data-section="Verbal" aria-selected="false">

            <section class="explanation" id="explanation">

                <span id="correctAnswer"></span>

            <button class="text-button" id="clearLogButton" hidden>Clear</button>
          </div>
          <div class="error-list" id="errorList"></div>
        </section>

        <section class="review-panel" aria-label="Notes">
          <div class="panel-head">
            <h2 class="panel-title">Notes</h2>
            <button class="text-button" id="clearNotesButton" hidden>Clear</button>
          </div>
          <textarea class="notes" id="notes" placeholder="Scratch notes stay on this device."></textarea>
        </section>
      </main>
    </div>

    <nav class="bottom-bar" aria-label="Question navigation">
      <button class="text-button" id="previousButton">Back</button>
      <button class="text-button warning" id="reviewButton" hidden>Review</button>
      <button class="text-button primary" id="nextButton">Next</button>
    </nav>
  </div>

    function hashText(text) {
      let hash = 2166136261;
      for (let index = 0; index < text.length; index += 1) {
        hash ^= text.charCodeAt(index);
        hash = Math.imul(hash, 16777619);
      }
      return Math.abs(hash >>> 0);
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function dedupe(values) {
      const seen = new Set();
      return values
        .map((value) => String(value))
        .filter((value) => {
          if (seen.has(value)) return false;
          seen.add(value);
          return true;
        });
    }

    function packChoices(correct, distractors, seed) {
      const values = dedupe([correct, ...distractors]);
      let nudge = 1;
      while (values.length < 5) {
        const numeric = Number.parseFloat(String(correct).replace(/[^\d.-]/g, ""));
        const candidate = Number.isFinite(numeric) ? String(numeric + nudge * 3) : `Choice ${values.length + 1}`;
        if (!values.includes(candidate)) values.push(candidate);
        nudge += 1;
      }
      const trimmed = values.slice(0, 5);
      const ordered = trimmed
        .map((value) => ({ value, rank: hashText(`${seed}-${value}`) }))
        .sort((a, b) => a.rank - b.rank)
        .map((item) => item.value);
      return { choices: ordered, answer: ordered.indexOf(String(correct)) };
    }

    function numericQuestion({ id, section, topic, stem, correct, distractors, explanation, difficulty, context }) {
      const packed = packChoices(correct, distractors, id);
      return {
        id,
        section,
        topic,
        stem,
        context,
        choices: packed.choices,
        answer: packed.answer,
        explanation,
        difficulty
      };
    }

    function isStandardsAlignedQuestion(question) {
      const text = `${question.stem || ""} ${question.context || ""} ${question.explanation || ""}`;
      if (question.section === "Quant") {
        return !/geometry|triangle|rectangle|perimeter|area|angle/i.test(`${question.topic || ""} ${text}`);
      }
      if (question.section === "Verbal") {
        return question.topic === "Critical Reasoning" || question.topic === "Reading Comprehension";
      }
      if (question.section === "DI") {
        return question.topic === "Data Sufficiency" || question.topic === "Table Analysis" || question.topic === "Multi-Source Reasoning";
      }
      return false;
    }

    function pruneQuestionBank(bank) {
      const seen = new Set();
      return bank.filter((question) => {
        if (!isStandardsAlignedQuestion(question)) return false;
        const key = `${question.section}|${question.topic}|${String(question.context || "")} ${question.stem}`.replace(/\s+/g, " ").trim();
        if (seen.has(key)) return false;
        seen.add(key);
        return true;
      });
    }

    function refreshPackedChoices(question, correct, distractors, seed) {
      const packed = packChoices(correct, distractors, seed);
      question.choices = packed.choices;
      question.answer = packed.answer;
    }

    function cleanGeneratedText(text) {
      return String(text || "")

        .replace(/\bA insurance firm\b/g, "An insurance firm")
        .replace(/\ba insurance firm\b/g, "an insurance firm")
        .replace(/\busing using\b/g, "using")
        .replace(/obstacle to raise profit/g, "obstacle to raising profit")
        .replace(/obstacle to reduce/g, "obstacle to reducing")
        .replace(/obstacle to increase/g, "obstacle to increasing")
        .replace(/obstacle to improve/g, "obstacle to improving")
        .replace(/obstacle to lower/g, "obstacle to lowering")
        .replace(/obstacle to speed/g, "obstacle to speeding");
    }

    function withScenario(question, scenarios) {
      const idNumber = Number((question.id.match(/-(\d+)$/) || [])[1] || 0);
      const scenario = scenarios[idNumber % scenarios.length];
      question.stem = `${scenario}: ${question.stem.charAt(0).toLowerCase()}${question.stem.slice(1)}`;
    }

    function winningIndex(rows, metric) {
      const metrics = rows.map(metric);
      const best = Math.max(...metrics);
      const winners = metrics.map((value, index) => value === best ? index : -1).filter((index) => index >= 0);
      return { answer: winners.length === 1 ? winners[0] : 4, metrics };
    }
